                if (clone.classList.contains('text-element')) {
                    enableToolbar('text');
                } else {
                    enableToolbar('image');
                }
            }
            saveState();
            renderLayersList();
        }

        function bringToFront() {
            if (!selectedElement) return;
            workspace.appendChild(selectedElement);
            saveState();
            renderLayersList();
        }

        // Enviar elemento al fondo del lienzo
        function sendToBack() {
            if (!selectedElement) return;
            const foldGuide = workspace.querySelector('.fold-guide');
            if (foldGuide && foldGuide.nextSibling) {
                workspace.insertBefore(selectedElement, foldGuide.nextSibling);
            } else {
                workspace.insertBefore(selectedElement, workspace.firstChild);
            }
            saveState();
            renderLayersList();
        }

        // PANEL VISUAL DE CAPAS (Photoshop Style con soporte Drag and Drop de reordenación)
        function renderLayersList() {
            const list = document.getElementById('layers-list');
            if (!list) return;
            list.innerHTML = '';

            const elements = Array.from(workspace.querySelectorAll('.canvas-element, .text-element'));
            if (elements.length === 0) {
                list.innerHTML = '<div style="color: #666; font-style: italic; font-size: 11px; text-align: center; padding: 10px;">Sin capas activas</div>';
                return;
            }

            for (let i = elements.length - 1; i >= 0; i--) {
                const el = elements[i];
                const isSelected = (el === selectedElement);
                
                const div = document.createElement('div');
                div.className = 'layer-item';
                div.setAttribute('draggable', 'true');
                div.setAttribute('data-dom-index', i);
                div.style.padding = '4px 6px';
                div.style.border = '1px solid ' + (isSelected ? '#00bcd4' : '#222');
                div.style.backgroundColor = isSelected ? '#333' : '#2b2b2b';
                div.style.borderRadius = '3px';
                div.style.cursor = 'pointer';
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.alignItems = 'center';
                div.style.fontSize = '11px';
                div.style.fontWeight = isSelected ? 'bold' : 'normal';

                let label = el.getAttribute('data-layer-name');
                if (!label) {
                    if (el.classList.contains('canvas-element')) {
                        label = `🖼️ Capa Imagen (${i + 1})`;
                    } else {
                        const textSnippet = el.innerText.substring(0, 15) || 'Texto';
                        label = `✍️ Texto: "${textSnippet}..."`;
                    }
                    el.setAttribute('data-layer-name', label);
                }

                const isHidden = (el.style.display === 'none');
                const eyeIcon = isHidden ? '❌' : '👁️';

                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 6px; overflow: hidden; flex: 1;">
                        <span class="drag-handle" style="cursor: grab; color: #666; font-weight: bold; font-size: 13px;">☰</span>
                        <span class="layer-label-text" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; display: inline-block; color: ${isSelected ? '#fff' : '#b5b5b5'};" title="Doble clic para renombrar">${label}</span>
                    </div>
                    <div style="display: flex; gap: 3px; align-items: center; flex-shrink: 0;">
                        <button onclick="event.stopPropagation(); toggleLayerVisibility(${i})" style="padding: 2px 4px; font-size: 9px; background-color: ${isHidden ? '#962d22' : '#444'}; color: white; border: none;" title="Mostrar/Ocultar">${eyeIcon}</button>
                        <button onclick="event.stopPropagation(); selectLayerByIndex(${i})" style="padding: 2px 4px; font-size: 9px; background-color: #444; border:none; color: white;">✏️</button>
                        <button onclick="event.stopPropagation(); deleteLayerByIndex(${i})" style="padding: 2px 4px; font-size: 9px; background-color: #962d22; border:none; color: white;">🗑️</button>
                    </div>
                `;

                div.onclick = () => selectLayerByIndex(i);

                const labelSpan = div.querySelector('.layer-label-text');
                labelSpan.ondblclick = (e) => {
                    e.stopPropagation();
                    const currentName = el.getAttribute('data-layer-name');
                    const newName = prompt("Introduce el nuevo nombre para la capa:", currentName);
                    if (newName !== null && newName.trim() !== "") {
                        el.setAttribute('data-layer-name', newName.trim());
                        saveState();
                        renderLayersList();
                    }
                };

                div.addEventListener('dragstart', (e) => {
                    e.stopPropagation();
                    div.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', i);
                    e.dataTransfer.effectAllowed = 'move';
                });

                div.addEventListener('dragend', () => {
                    div.classList.remove('dragging');
                });

                div.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    const draggingItem = list.querySelector('.dragging');
                    if (draggingItem && draggingItem !== div) {
                        const rect = div.getBoundingClientRect();
                        const next = (e.clientY - rect.top) > (rect.height / 2);
                        list.insertBefore(draggingItem, next ? div.nextSibling : div);
                    }
                });

                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const items = Array.from(list.querySelectorAll('.layer-item'));
                    items.reverse();

                    const foldGuide = workspace.querySelector('.fold-guide');
                    const eraserBox = workspace.querySelector('#eraser-area-box');

                    items.forEach(item => {
                        const domIdx = parseInt(item.getAttribute('data-dom-index'));
                        const targetEl = elements[domIdx];
                        if (targetEl) {
                            workspace.appendChild(targetEl);
                        }
                    });

                    if (foldGuide) workspace.appendChild(foldGuide);
                    if (eraserBox) workspace.appendChild(eraserBox);

                    saveState();
                    renderLayersList();
                });

                list.appendChild(div);
            }
        }

        // Alternar visibilidad de capa
        function toggleLayerVisibility(index) {
            const elements = workspace.querySelectorAll('.canvas-element, .text-element');
            const el = elements[index];
            if (el) {
                if (el.style.display === 'none') {
                    el.style.display = '';
                } else {
                    el.style.display = 'none';
                    if (selectedElement === el) {
                        deselectAll();
                    }
                }
                saveState();
                renderLayersList();
            }
        }

        function selectLayerByIndex(index) {
            const elements = workspace.querySelectorAll('.canvas-element, .text-element');
            const el = elements[index];
            if (el) {
                if (el.style.display === 'none') {
                    alert("Por favor muestra la capa pulsando en el icono del ojo antes de editarla.");
                    return;
                }
                if (selectedElement && selectedElement !== el) {
                    selectedElement.classList.remove('editing');
                    if (selectedElement.classList.contains('text-element')) {
                        selectedElement.style.border = '1px dashed #7f8c8d';
                    }
                }
                selectedElement = el;
                el.classList.add('editing');
                if (el.classList.contains('text-element')) {
                    el.style.border = "2px solid #00bcd4";
                    enableToolbar('text');
                } else {
                    enableToolbar('image');
                }
                renderLayersList();
            }
        }

        function deleteLayerByIndex(index) {
            const elements = workspace.querySelectorAll('.canvas-element, .text-element');
            const el = elements[index];
            if (el) {
                if (confirm("¿Seguro que deseas eliminar esta capa?")) {
                    el.remove();
                    deselectAll();
                    saveState();
                    renderLayersList();
                }
            }
        }

        // Historial
        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                pagesA3 = JSON.parse(history[historyIndex]);
                loadPageContent();
                renderA3PagesList();
            }
        }
        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                pagesA3 = JSON.parse(history[historyIndex]);
                loadPageContent();
                renderA3PagesList();
            }
        }

        // Helper asíncrono para asegurar la carga completa de recursos gráficos
        function loadImgAsync(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = (e) => reject(e);
                img.src = src;
            });
        }

        // GUARDAR / CARGAR TRABAJO COMPLETO EN FORMATO JSON
        function saveProjectJSON() {
            deselectAll();
            
            const activePage = pagesA3.find(p => p.id === activePageId);
            if (activePage) {
                activePage.htmlContent = workspace.innerHTML;
            }

            const imageLibrary = {};
            let imageCounter = 0;

            const optimizedPages = pagesA3.map(page => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = page.htmlContent;

                const canvases = tempDiv.querySelectorAll('.canvas-element canvas');
                canvases.forEach(canvas => {
                    const dataUrl = canvas.getAttribute('data-img-data');
                    if (dataUrl) {
                        let matchedKey = null;
                        
                        for (const [key, value] of Object.entries(imageLibrary)) {
                            if (value === dataUrl) {
                                matchedKey = key;
                                break;
                            }
                        }

                        if (!matchedKey) {
                            imageCounter++;
                            matchedKey = `img_asset_${imageCounter}`;
                            imageLibrary[matchedKey] = dataUrl;
                        }

                        canvas.setAttribute('data-img-data', matchedKey);
                    }
                });

                return {
                    id: page.id,
                    htmlContent: tempDiv.innerHTML
                };
            });

            const projectData = {
                pagesA3: optimizedPages,
                activePageId: activePageId,
                insertedPagesCount: insertedPagesCount,
                imageLibrary: imageLibrary
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData));
            
            let projectTitle = "";
            while (!projectTitle || projectTitle.trim() === "") {
                projectTitle = prompt("Introduce el nombre con el que deseas guardar el proyecto (.JSON):", "Mi_Proyecto_Partituras");
                if (projectTitle === null) return; 
            }

            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `${projectTitle.trim()}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function loadProjectJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const projectData = JSON.parse(e.target.result);
                    if (projectData.pagesA3 && Array.isArray(projectData.pagesA3)) {
                        const library = projectData.imageLibrary || {};

                        pagesA3 = projectData.pagesA3.map(page => {
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = page.htmlContent;

                            const canvases = tempDiv.querySelectorAll('.canvas-element canvas');
                            canvases.forEach(canvas => {
                                const key = canvas.getAttribute('data-img-data');
                                if (key && library[key]) {
                                    canvas.setAttribute('data-img-data', library[key]);
                                }
                            });

                            return {
                                id: page.id,
                                htmlContent: tempDiv.innerHTML
                            };
                        });

                        activePageId = projectData.activePageId || pagesA3[0].id;
                        insertedPagesCount = projectData.insertedPagesCount || 0;
                        history = [];
                        historyIndex = -1;

                        loadPageContent();
                        renderA3PagesList();
                        saveState();
                        alert("Proyecto cargado con éxito.");
                    } else {
                        alert("El archivo JSON no tiene un formato válido para el editor.");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Error al leer el archivo JSON.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // EXPORTACIÓN AVANZADA
        async function exportWholeProjectZIP() {
            deselectAll();
            
            const activePage = pagesA3.find(p => p.id === activePageId);
            if (activePage) {
                activePage.htmlContent = workspace.innerHTML;
            }

            let exportTitle = "";
            while (!exportTitle || exportTitle.trim() === "") {
                exportTitle = prompt("Por favor, introduce el título del proyecto para exportar los PDF y el ZIP:", "Libreto_Continuo");
                if (exportTitle === null) return; 
            }
            exportTitle = exportTitle.trim();

            const { jsPDF } = window.jspdf;

            const pdfA3 = new jsPDF({
                orientation: 'landscape',
                unit: 'pt',
                format: 'a3'
            });

            const pdfA4 = new jsPDF({
                orientation: 'portrait',
                unit: 'pt',
                format: 'a4'
            });

            const renderDiv = document.createElement('div');
            renderDiv.style.width = '1191px';
            renderDiv.style.height = '842px';
            renderDiv.style.position = 'fixed';
            renderDiv.style.top = '-9999px';
            renderDiv.style.left = '-9999px';
            renderDiv.style.backgroundColor = 'white';
            document.body.appendChild(renderDiv);

            const exportScale = 2.5;

            for (let index = 0; index < pagesA3.length; index++) {
                const page = pagesA3[index];
                renderDiv.innerHTML = page.htmlContent;

                const elList = renderDiv.querySelectorAll('.canvas-element');
                for (let el of elList) {
                    const canvas = el.querySelector('canvas');
                    if (canvas && canvas.getAttribute('data-img-data')) {
                        try {
                            const img = await loadImgAsync(canvas.getAttribute('data-img-data'));
                            const ctx = canvas.getContext('2d');
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0);
                        } catch (err) {
                            console.error("Error al restaurar canvas para exportación:", err);
                        }
                    }
                }

                const guides = renderDiv.querySelectorAll('.resize-handle, .fold-guide');
                guides.forEach(g => g.style.setProperty('display', 'none', 'important'));

                const hiddenElements = renderDiv.querySelectorAll('.canvas-element, .text-element');
                hiddenElements.forEach(item => {
                    if (item.style.display === 'none') {
                        item.style.setProperty('visibility', 'hidden', 'important');
                    }
                });

                const a3Canvas = document.createElement('canvas');
                a3Canvas.width = 1191 * exportScale;
                a3Canvas.height = 842 * exportScale;
                const a3Ctx = a3Canvas.getContext('2d');
                a3Ctx.fillStyle = '#ffffff';
                a3Ctx.fillRect(0, 0, a3Canvas.width, a3Canvas.height);

                const items = renderDiv.querySelectorAll('.canvas-element, .text-element');
                for (let item of items) {
                    if (item.style.visibility === 'hidden') continue; 

                    const left = parseFloat(item.style.left) || 0;
                    const top = parseFloat(item.style.top) || 0;
                    const width = parseFloat(item.style.width) || item.offsetWidth || 0;
                    const height = parseFloat(item.style.height) || item.offsetHeight || 0;
                    
                    let rot = 0;
                    const trans = item.style.transform || '';
                    const match = trans.match(/rotate\(([^)]+)deg\)/);
                    if (match) rot = parseFloat(match[1]);

                    a3Ctx.save();
                    a3Ctx.translate((left + width/2) * exportScale, (top + height/2) * exportScale);
                    a3Ctx.rotate(rot * Math.PI / 180);

                    if (item.classList.contains('canvas-element')) {
                        const originalCanvas = item.querySelector('canvas');
                        if (originalCanvas) {
                            a3Ctx.drawImage(originalCanvas, -width/2 * exportScale, -height/2 * exportScale, width * exportScale, height * exportScale);
                        }
                    } else if (item.classList.contains('text-element')) {
                        const text = item.innerText;
                        const fontSize = item.style.fontSize || '24px';
                        const fontFamily = item.style.fontFamily || 'Arial';
                        const fontWeight = item.style.fontWeight || 'normal';
                        const fontStyle = item.style.fontStyle || 'normal';

                        const sizeNumeric = parseFloat(fontSize) || 24;
                        const scaledFontSize = sizeNumeric * exportScale;

                        a3Ctx.font = `${fontStyle} ${fontWeight} ${scaledFontSize}px ${fontFamily}`;
                        a3Ctx.textBaseline = 'top';

                        a3Ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                        a3Ctx.fillRect(-width/2 * exportScale, -height/2 * exportScale, width * exportScale, height * exportScale);

                        a3Ctx.fillStyle = item.style.color || '#000';
                        const lines = text.split('\n');
                        let currentY = (-height/2 + 5) * exportScale;
                        lines.forEach(line => {
                            a3Ctx.fillText(line, (-width/2 + 5) * exportScale, currentY);
                            currentY += scaledFontSize * 1.2;
                        });
                    }
                    a3Ctx.restore();
                }

                const a3ImgData = a3Canvas.toDataURL("image/jpeg", 0.82);

                if (index > 0) {
                    pdfA3.addPage('a3', 'landscape');
                }
                pdfA3.addImage(a3ImgData, 'JPEG', 0, 0, 1190.55, 841.89);

                const leftCanvas = document.createElement('canvas');
                leftCanvas.width = 595 * exportScale;
                leftCanvas.height = 842 * exportScale;
                const leftCtx = leftCanvas.getContext('2d');
                leftCtx.drawImage(a3Canvas, 0, 0, 595 * exportScale, 842 * exportScale, 0, 0, 595 * exportScale, 842 * exportScale);
                const leftImgData = leftCanvas.toDataURL("image/jpeg", 0.82);

                if (index > 0 || (index === 0 && pdfA4.internal.getNumberOfPages() > 1)) {
                    pdfA4.addPage('a4', 'portrait');
                }
                pdfA4.addImage(leftImgData, 'JPEG', 0, 0, 595.28, 841.89);

                const rightCanvas = document.createElement('canvas');
                rightCanvas.width = 595 * exportScale;
                rightCanvas.height = 842 * exportScale;
                const rightCtx = rightCanvas.getContext('2d');
                rightCtx.drawImage(a3Canvas, 596 * exportScale, 0, 595 * exportScale, 842 * exportScale, 0, 0, 595 * exportScale, 842 * exportScale);
                const rightImgData = rightCanvas.toDataURL("image/jpeg", 0.82);

                pdfA4.addPage('a4', 'portrait');
                pdfA4.addImage(rightImgData, 'JPEG', 0, 0, 595.28, 841.89);
            }

            document.body.removeChild(renderDiv);

            const a3PdfOutput = pdfA3.output('arraybuffer');
            const a4PdfOutput = pdfA4.output('arraybuffer');

            const zip = new JSZip();
            const a3Folder = zip.folder("Partituras impresion en A3");
            const a4Folder = zip.folder("Partituras en A4");

            a3Folder.file(`${exportTitle}_A3.pdf`, a3PdfOutput);
            a4Folder.file(`${exportTitle}_A4.pdf`, a4PdfOutput);

            zip.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a');
                link.download = `${exportTitle}.zip`;
                link.href = URL.createObjectURL(content);
                link.click();
            });
        }

        // Inicio
        renderA3PagesList();
        saveState();
    </script>
</body>
