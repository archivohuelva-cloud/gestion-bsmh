<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Partituras - BSMH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        .drag-over {
            border-color: #2563eb !important;
            background-color: #f0f7ff !important;
        }
        .sortable-ghost {
            opacity: 0.3;
            background-color: #e5e7eb;
        }
        .pdf-preview-frame {
            width: 100%;
            height: 85vh;
            border: none;
        }
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        #pdfList {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .order-input::-webkit-inner-spin-button,
        .order-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .no-drag {
            cursor: default;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans no-select text-gray-800">

    <div class="max-w-xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="mb-6 text-center">
            <div id="currentDateTime" class="text-[18px] uppercase tracking-wider text-blue-600 font-bold mb-1"></div>
            <h1 class="text-2xl font-bold text-gray-800 mb-1">Unificador de Partituras BSMH</h1>
            <p class="text-sm text-gray-600 italic">Unir en 1 solo PDF múltiples partichelas individuales</p>
        </header>

        <!-- Dropzone -->
        <div id="dropzone" onclick="document.getElementById('fileInput').click()" class="relative border-2 border-dashed border-gray-300 rounded-xl p-6 text-center transition-all bg-white shadow-sm cursor-pointer hover:border-blue-400 group">
            <input type="file" id="fileInput" multiple accept="application/pdf" class="hidden">
            <div class="space-y-2 pointer-events-none">
                <div class="mx-auto w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <p class="text-base font-medium text-gray-700">Arrastre los archivos PDF´s o haga clic aquí</p>
                </div>
            </div>
        </div>

        <!-- List Section -->
        <div id="listContainer" class="mt-6 hidden">
            <div class="flex items-center justify-between mb-3 px-2 bg-gray-200 p-2 rounded-lg">
                <div class="flex items-center gap-3">
                    <h2 class="text-sm font-bold text-gray-700">Lista</h2>
                    <div id="fileCounterContainer" class="flex gap-1 flex-wrap">
                        <span id="fileCounter" class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">0 PDFs</span>
                        <span id="copyCounter" class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">0 Copias</span>
                        <span id="pageCounter" class="bg-green-600 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">0 Páginas</span>
                    </div>
                </div>
                <span class="text-[10px] text-gray-500 italic">Reordenar</span>
            </div>
            
            <div id="pdfList">
                <!-- Items will be injected here -->
            </div>

            <!-- Opciones de Configuración -->
            <div class="mt-4 space-y-2">
                <!-- Opción BSMHuelva -->
                <div class="flex items-center justify-center p-3 bg-indigo-50 border border-indigo-100 rounded-lg">
                    <input type="checkbox" id="bsmhCheckbox" class="w-4 h-4 text-indigo-600 bg-white border-gray-300 rounded focus:ring-indigo-500 cursor-pointer">
                    <label for="bsmhCheckbox" class="ml-2 text-xs font-bold text-indigo-800 cursor-pointer select-none">
                        Copias para BSMHuelva (Ajuste automático de copias)
                    </label>
                </div>

                <!-- Opción para Doble Cara -->
                <div class="flex items-center justify-center p-3 bg-blue-50 border border-blue-100 rounded-lg">
                    <input type="checkbox" id="doubleSidedCheckbox" class="w-4 h-4 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    <label for="doubleSidedCheckbox" class="ml-2 text-xs font-semibold text-gray-700 cursor-pointer select-none">
                        Preparar para impresión a doble cara (añade pág. en blanco en impares)
                    </label>
                </div>
            </div>

            <!-- Actions -->
            <div class="mt-4 flex flex-col sm:flex-row gap-3 justify-center">
                <button id="clearBtn" class="px-4 py-2 border border-red-300 text-red-600 rounded-lg hover:bg-red-50 font-medium transition-colors text-xs">
                    Limpiar lista
                </button>
                <button id="generateBtn" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-md shadow-blue-200 transition-all flex items-center justify-center gap-2 text-xs">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    Generar PDF Final
                </button>
            </div>
        </div>

        <!-- Botón Volver Inferior -->
        <div class="mt-12 flex justify-center border-t border-gray-200 pt-6">
            <button onclick="history.back()" class="flex items-center gap-2 text-gray-500 hover:text-blue-600 transition-colors group">
                <div class="p-2 bg-white rounded-lg shadow-sm border border-gray-200 group-hover:border-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </div>
                <span class="text-[11px] font-bold uppercase tracking-widest">Volver</span>
            </button>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl h-[85vh] overflow-hidden flex flex-col">
            <div class="p-3 border-b flex justify-between items-center bg-gray-50">
                <h3 id="modalTitle" class="font-bold text-gray-800 truncate text-xs">Previsualización</h3>
                <button id="closeModal" class="text-gray-400 hover:text-red-500 p-1 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="modalBody" class="flex-grow bg-gray-100"></div>
        </div>
    </div>

    <!-- Download Options Modal -->
    <div id="downloadModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="p-4 border-b bg-gray-50">
                <h3 class="font-bold text-gray-800 text-lg">Guardar PDF Final</h3>
            </div>
            <div class="p-6 flex-grow bg-white space-y-4">
                <p class="text-sm text-gray-600 mb-4">Seleccione el nombre para el archivo generado:</p>
                
                <div class="flex items-center">
                    <input type="radio" id="radioDefault" name="fileNameOption" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 cursor-pointer" checked>
                    <label for="radioDefault" class="ml-2 text-sm font-medium text-gray-700 cursor-pointer">
                        Nombre automático (<span id="defaultNameDisplay" class="italic text-gray-500"></span>)
                    </label>
                </div>
                
                <div class="flex items-center">
                    <input type="radio" id="radioCustom" name="fileNameOption" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 cursor-pointer">
                    <label for="radioCustom" class="ml-2 text-sm font-medium text-gray-700 cursor-pointer">
                        Personalizar nombre
                    </label>
                </div>
                
                <div id="customNameContainer" class="hidden pl-6 pt-2">
                    <input type="text" id="customNameInput" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Escriba el nombre del archivo...">
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-3">
                <button id="cancelDownloadBtn" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 font-medium transition-colors text-sm">
                    Cancelar
                </button>
                <button id="acceptDownloadBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-md shadow-blue-200 transition-all text-sm">
                    Aceptar
                </button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const pdfList = document.getElementById('pdfList');
        const listContainer = document.getElementById('listContainer');
        const fileCounter = document.getElementById('fileCounter');
        const copyCounter = document.getElementById('copyCounter');
        const pageCounter = document.getElementById('pageCounter');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const previewModal = document.getElementById('previewModal');
        const closeModal = document.getElementById('closeModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const dateTimeDisplay = document.getElementById('currentDateTime');
        const bsmhCheckbox = document.getElementById('bsmhCheckbox');
        const doubleSidedCheckbox = document.getElementById('doubleSidedCheckbox');

        // Elementos del nuevo modal de descarga
        const downloadModal = document.getElementById('downloadModal');
        const cancelDownloadBtn = document.getElementById('cancelDownloadBtn');
        const acceptDownloadBtn = document.getElementById('acceptDownloadBtn');
        const radioDefault = document.getElementById('radioDefault');
        const radioCustom = document.getElementById('radioCustom');
        const customNameContainer = document.getElementById('customNameContainer');
        const customNameInput = document.getElementById('customNameInput');
        const defaultNameDisplay = document.getElementById('defaultNameDisplay');

        let uploadedFiles =[];
        let defaultFileName = "Repertorio_BSMH";
        let uploadedFolderName = null; // Variable para guardar el nombre de la carpeta

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            dateTimeDisplay.textContent = now.toLocaleDateString('es-ES', options);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        const sortable = new Sortable(pdfList, {
            animation: 200,
            ghostClass: 'sortable-ghost',
            forceFallback: true,
            filter: '.no-drag',
            preventOnFilter: false,
            onEnd: function() {
                syncInternalStateWithDOM();
                renderList(); 
            }
        });

        function syncInternalStateWithDOM() {
            const currentOrderIds = Array.from(pdfList.children).map(el => el.dataset.id);
            uploadedFiles = currentOrderIds.map(id => uploadedFiles.find(f => f.id === id));
        }

        fileInput.addEventListener('change', (e) => {
            if (uploadedFiles.length === 0) uploadedFolderName = null; // Si se suben sueltos y estaba vacío, no hay carpeta
            if (e.target.files.length > 0) handleFiles(e.target.files);
        });

        dropzone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            e.stopPropagation();
            dropzone.classList.add('drag-over'); 
        });
        
        dropzone.addEventListener('dragleave', (e) => { 
            e.preventDefault();
            e.stopPropagation();
            dropzone.classList.remove('drag-over'); 
        });

        dropzone.addEventListener('drop', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropzone.classList.remove('drag-over');

            const items = e.dataTransfer.items;
            const files = e.dataTransfer.files;

            // Detectar si se arrastra una única carpeta
            if (uploadedFiles.length === 0) {
                uploadedFolderName = null;
                if (items && items.length === 1) {
                    const entry = items[0].webkitGetAsEntry();
                    if (entry && entry.isDirectory) {
                        uploadedFolderName = entry.name;
                    }
                }
            }

            if (items && items.length > 0 && items[0].webkitGetAsEntry) {
                let allFiles =[];
                const promises =[];

                for (let i = 0; i < items.length; i++) {
                    const entry = items[i].webkitGetAsEntry();
                    if (entry) {
                        promises.push(scanFiles(entry));
                    }
                }

                const results = await Promise.all(promises);
                allFiles = results.flat();

                if (allFiles.length > 0) {
                    handleFiles(allFiles);
                }
            } else if (files && files.length > 0) {
                // Fallback por si el navegador no soporta webkitGetAsEntry o se arrastran archivos simples
                handleFiles(files);
            }
        });

        async function scanFiles(entry) {
            let files =[];
            if (entry.isFile) {
                const file = await new Promise((resolve) => entry.file(resolve));
                // Comprobamos tanto el tipo MIME como la extensión por si el navegador pierde el tipo al arrastrar
                if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
                    files.push(file);
                }
            } else if (entry.isDirectory) {
                const directoryReader = entry.createReader();
                const entries = await new Promise((resolve) => {
                    directoryReader.readEntries(resolve);
                });
                
                const promises = entries.map(childEntry => scanFiles(childEntry));
                const results = await Promise.all(promises);
                files = results.flat();
            }
            return files;
        }

        // Normaliza el texto para buscar sin acentos ni mayúsculas
        const normalizeText = (text) => text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        function applyBSMHRules() {
            if (!bsmhCheckbox.checked) {
                // Si se desmarca, todas las copias vuelven a 1
                uploadedFiles.forEach(item => item.copies = 1);
                return;
            }

            // Encontrar el índice del último archivo de Tuba
            let lastTubaIndex = -1;
            uploadedFiles.forEach((item, index) => {
                if (/tuba/.test(normalizeText(item.name))) {
                    lastTubaIndex = index;
                }
            });

            // Filtrar instrumentos que no están en la lista base (manteniendo los que van después de la Tuba)
            const isBaseInstrument = (name) => {
                // Excluir explícitamente trompa 2 (o superior)
                if (/trompa\s*[2-9]/.test(name)) return false;
		// Excluir explícitamente trombon 3 (o superior)
                if (/trombon\s*[3-9]/.test(name)) return false;
                
                // Solo aceptar saxo alto y tenor (excluye barítono, soprano, etc.)
                return /flauta|oboe|requinto|clarinete|saxo\s*alto|saxo\s*tenor|trompa|trompeta|trombon|tuba/.test(name);
            };

            uploadedFiles = uploadedFiles.filter((item, index) => {
                // Si hay una tuba y el archivo está después de ella, se mantiene (percusión, etc.)
                if (lastTubaIndex !== -1 && index > lastTubaIndex) return true;
                // Si está antes o es la tuba, solo se mantiene si es un instrumento base
                return isBaseInstrument(normalizeText(item.name));
            });

            const hasFile = (regex) => uploadedFiles.some(f => regex.test(normalizeText(f.name)));

            const hasClarinetePral = hasFile(/clarinete\s*(pral|principal)/);
            const hasSaxoAlto1 = hasFile(/saxo\s*alto\s*1/);
            const hasSaxoAlto2 = hasFile(/saxo\s*alto\s*2/);
            const hasSaxoTenor1 = hasFile(/saxo\s*tenor\s*1/);
            const hasSaxoTenor2 = hasFile(/saxo\s*tenor\s*2/);
            const hasTrompeta1 = hasFile(/trompeta\s*1/);
            const hasTrompeta2 = hasFile(/trompeta\s*2/);
            const hasTrombon1 = hasFile(/trombon\s*1/);
            const hasTrombon2 = hasFile(/trombon\s*2/);
            const hasTuba1 = hasFile(/tuba\s*1/);
            const hasTuba2 = hasFile(/tuba\s*2/);

            uploadedFiles.forEach(item => {
                const name = normalizeText(item.name);
                let copies = 1; // Por defecto 1

                if (/flauta/.test(name)) copies = 1;
                else if (/oboe/.test(name)) copies = 1;
                else if (/requinto/.test(name)) copies = 1;
                else if (/clarinete\s*pral\s*y\s*1/.test(name)) copies = 3;
                else if (/clarinete\s*(pral|principal)/.test(name)) copies = 1;
                else if (/clarinete\s*1/.test(name)) copies = hasClarinetePral ? 2 : 3;
                else if (/clarinete\s*2/.test(name)) copies = 1;
                else if (/clarinete\s*3/.test(name)) copies = 1;
                else if (/saxo\s*alto\s*1/.test(name)) copies = 1;
                else if (/saxo\s*alto\s*2/.test(name)) copies = 1;
                else if (/saxo\s*alto/.test(name) && !hasSaxoAlto1 && !hasSaxoAlto2) copies = 2;
                else if (/saxo\s*tenor\s*1/.test(name)) copies = 1;
                else if (/saxo\s*tenor\s*2/.test(name)) copies = 1;
                else if (/saxo\s*tenor/.test(name) && !hasSaxoTenor1 && !hasSaxoTenor2) copies = 2;
                else if (/trompa/.test(name)) copies = 1;
                else if (/trompeta\s*1/.test(name)) copies = 1;
                else if (/trompeta\s*2/.test(name)) copies = 1;
                else if (/trompeta/.test(name) && !hasTrompeta1 && !hasTrompeta2) copies = 2;
                else if (/trombon\s*1/.test(name)) copies = 1;
                else if (/trombon\s*2/.test(name)) copies = 1;
                else if (/trombon/.test(name) && !hasTrombon1 && !hasTrombon2) copies = 2;
                else if (/tuba\s*1/.test(name)) copies = 1;
                else if (/tuba\s*2/.test(name)) copies = 1;
                else if (/tuba/.test(name) && !hasTuba1 && !hasTuba2) copies = 2;
                else if (/bombo\s*y\s*platos|bombo|platos/.test(name)) copies = 2;

                item.copies = copies;
            });
        }

        bsmhCheckbox.addEventListener('change', () => {
            applyBSMHRules();
            renderList();
        });

        doubleSidedCheckbox.addEventListener('change', () => {
            renderList(); // Recalcular páginas totales
        });

        async function handleFiles(files) {
            // Filtramos también por extensión .pdf por si falla el MIME type
            const validFiles = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
            if (validFiles.length === 0) return;
            
            const newFiles = await Promise.all(validFiles.map(async (file) => {
                const id = Math.random().toString(36).substr(2, 9);
                let pageCount = 0;
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    pageCount = pdfDoc.getPageCount();
                } catch (e) {
                    console.error('Error al leer PDF', e);
                }
                return {
                    id: id,
                    file: file,
                    copies: 1,
                    name: file.name,
                    pageCount: pageCount
                };
            }));

            // Ordenación natural alfanumérica por nombre de archivo
            uploadedFiles =[...uploadedFiles, ...newFiles].sort((a, b) => {
                return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
            });
            
            if (bsmhCheckbox.checked) {
                applyBSMHRules();
            }

            renderList();
            fileInput.value = ''; 
        }

        function renderList() {
            if (uploadedFiles.length > 0) {
                listContainer.classList.remove('hidden');
                const totalPdfs = uploadedFiles.length;
                const totalCopies = uploadedFiles.reduce((sum, item) => sum + item.copies, 0);
                
                // Calcular páginas totales
                const isDoubleSided = doubleSidedCheckbox.checked;
                let totalPages = 0;
                uploadedFiles.forEach(item => {
                    let pagesPerCopy = item.pageCount;
                    if (isDoubleSided && item.pageCount % 2 !== 0) {
                        pagesPerCopy += 1; // Sumar la página en blanco
                    }
                    totalPages += (pagesPerCopy * item.copies);
                });

                fileCounter.innerText = `${totalPdfs} PDF${totalPdfs !== 1 ? 's' : ''}`;
                copyCounter.innerText = `${totalCopies} Copia${totalCopies !== 1 ? 's' : ''}`;
                pageCounter.innerText = `${totalPages} Página${totalPages !== 1 ? 's' : ''}`;
            } else {
                listContainer.classList.add('hidden');
            }

            pdfList.innerHTML = '';
            uploadedFiles.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center bg-white border border-gray-200 p-2 rounded-lg shadow-sm hover:border-blue-300 transition-all cursor-move group h-12';
                row.dataset.id = item.id;
                
                row.innerHTML = `
                    <div class="flex items-center gap-2 mr-3">
                        <div class="text-gray-300 group-hover:text-blue-400 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16" />
                            </svg>
                        </div>
                        <input type="number" value="${index + 1}" min="1" max="${uploadedFiles.length}"
                            class="no-drag order-input w-10 text-center font-bold text-xs bg-blue-50 text-blue-700 border border-blue-100 rounded py-0.5 focus:ring-1 focus:ring-blue-400 outline-none"
                            onchange="manualMove('${item.id}', this.value)">
                    </div>

                    <div class="flex-grow min-w-0 flex items-center pr-2">
                        <p class="font-medium text-gray-700 text-[11px] leading-tight truncate" title="${item.name}">${item.name}</p>
                        <span class="ml-2 text-[9px] font-semibold text-gray-500 bg-gray-100 border border-gray-200 px-1.5 py-0.5 rounded shadow-sm flex-shrink-0" title="Número de páginas">${item.pageCount} pág.</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <button onclick="event.stopPropagation(); openPreview('${item.id}')" class="no-drag text-[9px] font-bold text-gray-400 uppercase hover:text-blue-600">Ver</button>
                        
                        <div class="no-drag flex items-center bg-gray-50 border border-gray-200 rounded overflow-hidden h-7">
                            <button onclick="event.stopPropagation(); updateCopies('${item.id}', -1)" class="w-6 h-full flex items-center justify-center hover:bg-red-50 hover:text-red-600 text-gray-400 font-bold text-xs"> - </button>
                            <span class="w-6 text-center text-xs font-bold text-blue-700">${item.copies}</span>
                            <button onclick="event.stopPropagation(); updateCopies('${item.id}', 1)" class="w-6 h-full flex items-center justify-center hover:bg-green-50 hover:text-green-600 text-gray-400 font-bold text-xs"> + </button>
                        </div>

                        <button onclick="event.stopPropagation(); removeFile('${item.id}')" class="no-drag text-gray-300 hover:text-red-500 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                `;
                pdfList.appendChild(row);
            });
        }

        window.manualMove = (id, newPos) => {
            let targetIdx = parseInt(newPos) - 1;
            const currentIdx = uploadedFiles.findIndex(f => f.id === id);
            if (targetIdx < 0) targetIdx = 0;
            if (targetIdx >= uploadedFiles.length) targetIdx = uploadedFiles.length - 1;
            if (currentIdx !== targetIdx) {
                const[item] = uploadedFiles.splice(currentIdx, 1);
                uploadedFiles.splice(targetIdx, 0, item);
                renderList();
            }
        };

        window.updateCopies = (id, change) => {
            const item = uploadedFiles.find(f => f.id === id);
            if (item) {
                item.copies = Math.max(1, item.copies + change);
                // Si el usuario cambia manualmente, desmarcamos el checkbox automático para que no se sobreescriba
                if (bsmhCheckbox.checked) {
                    bsmhCheckbox.checked = false;
                }
                renderList();
            }
        };

        window.removeFile = (id) => {
            uploadedFiles = uploadedFiles.filter(f => f.id !== id);
            if (bsmhCheckbox.checked) applyBSMHRules(); // Re-evaluar por si se borró un papel principal
            renderList();
        };

        window.openPreview = (id) => {
            const item = uploadedFiles.find(f => f.id === id);
            if (item) {
                modalTitle.innerText = item.name;
                const url = URL.createObjectURL(item.file);
                modalBody.innerHTML = `<iframe src="${url}#view=FitH" class="pdf-preview-frame"></iframe>`;
                previewModal.classList.remove('hidden');
                closeModal.onclick = () => {
                    previewModal.classList.add('hidden');
                    URL.revokeObjectURL(url);
                    modalBody.innerHTML = '';
                };
            }
        };

        clearBtn.onclick = () => {
            if (uploadedFiles.length > 0 && confirm('¿Vaciar lista?')) {
                uploadedFiles =[];
                uploadedFolderName = null; // Resetear el nombre de la carpeta
                renderList();
                fileInput.value = '';
            }
        };

        // Lógica para mostrar el modal de descarga
        generateBtn.onclick = () => {
            if (uploadedFiles.length === 0) return;
            
            if (uploadedFolderName) {
                // Si se subió una carpeta, por defecto se marca la opción automática con el nombre de la carpeta
                defaultFileName = uploadedFolderName;
                defaultNameDisplay.innerText = defaultFileName + ".pdf";
                radioDefault.checked = true;
                radioCustom.checked = false;
                customNameContainer.classList.add('hidden');
                customNameInput.value = defaultFileName;
            } else {
                // Si se subieron archivos sueltos, por defecto se marca la opción personalizar
                defaultFileName = "Partituras Unificadas";
                defaultNameDisplay.innerText = "Varios_archivos.pdf";
                radioDefault.checked = false;
                radioCustom.checked = true;
                customNameContainer.classList.remove('hidden');
                customNameInput.value = "Partituras Unificadas";
            }
            
            downloadModal.classList.remove('hidden');
        };

        // Eventos de los radio buttons
        radioDefault.addEventListener('change', () => {
            if(radioDefault.checked) customNameContainer.classList.add('hidden');
        });

        radioCustom.addEventListener('change', () => {
            if(radioCustom.checked) {
                customNameContainer.classList.remove('hidden');
                customNameInput.focus();
            }
        });

        // Botón Cancelar
        cancelDownloadBtn.onclick = () => {
            downloadModal.classList.add('hidden');
        };

        // Botón Aceptar (Generar PDF)
        acceptDownloadBtn.onclick = async () => {
            downloadModal.classList.add('hidden');
            
            let finalName = radioDefault.checked ? defaultFileName : customNameInput.value.trim();
            if(!finalName) finalName = "Partituras Unificadas";
            if(!finalName.toLowerCase().endsWith('.pdf')) finalName += ".pdf";

            const originalHtml = generateBtn.innerHTML;
            generateBtn.disabled = true;
            generateBtn.innerHTML = "Generando...";

            const isDoubleSided = doubleSidedCheckbox.checked;

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (const item of uploadedFiles) {
                    const fileArrayBuffer = await item.file.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(fileArrayBuffer);
                    const pageCount = pdfDoc.getPageCount();

                    for (let c = 0; c < item.copies; c++) {
                        const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                        let lastCopiedPage = null;

                        copiedPages.forEach(p => {
                            mergedPdf.addPage(p);
                            lastCopiedPage = p; 
                        });

                        if (isDoubleSided && pageCount % 2 !== 0) {
                            if (lastCopiedPage) {
                                const { width, height } = lastCopiedPage.getSize();
                                mergedPdf.addPage([width, height]);
                            } else {
                                mergedPdf.addPage();
                            }
                        }
                    }
                }
                
                const bytes = await mergedPdf.save();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
                link.download = finalName;
                link.click();
            } catch (e) {
                alert('Error al generar PDF');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = originalHtml;
            }
        };

        // Evento para la tecla Enter en el modal de descarga
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !downloadModal.classList.contains('hidden')) {
                e.preventDefault();
                acceptDownloadBtn.click();
            }
        });

        previewModal.onclick = (e) => { if (e.target === previewModal) closeModal.click(); };
        downloadModal.onclick = (e) => { if (e.target === downloadModal) cancelDownloadBtn.click(); };
    </script>
</body>
</html>
