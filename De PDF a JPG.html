<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Previa JPG - BSMH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --primary: #003366;
            --secondary: #28a745;
            --danger: #d9534f;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn-home {
            background-color: var(--white);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background-color: var(--primary);
            color: var(--white);
        }

        .header-info {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 600;
            text-transform: capitalize;
        }

        .card {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 1100px;
            width: 100%;
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
            text-align: center;
        }

        .upload-section {
            border: 2px dashed #00336644;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            background: #f0f4f8;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .upload-section.hidden { display: none; }

        .controls {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
        }

        input, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        input.required-error {
            border-color: var(--danger);
            background-color: #fff2f2;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { opacity: 0.9; }

        .btn-danger { background-color: var(--danger); }
        .btn-secondary { background-color: var(--secondary); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .grid-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            overflow-y: auto;
            padding: 10px;
            background: #eee;
            border-radius: 6px;
        }

        .page-thumb {
            cursor: pointer;
            border: 3px solid transparent;
            background: white;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
        }

        .page-thumb:hover { border-color: var(--primary); }
        .page-thumb canvas { width: 100%; height: auto; display: block; }
        .page-thumb span { display: block; margin-top: 5px; font-weight: bold; font-size: 0.75rem; }

        /* Vista Previa Final */
        .final-preview {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            align-items: center;
            background: #fff;
            min-height: 300px;
        }

        canvas#main-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="header-top">
        <a href="index.html" class="btn-home">Inicio</a>
        <div class="header-info" id="current-date-time">
            <!-- Se cargará mediante JS -->
        </div>
    </div>

    <div class="card">
        <h1>De PDF del guión a JPG para Biblio</h1>
        
        <!-- Sección de subida -->
        <div class="upload-section" id="upload-box">
            <p>Selecciona o arrastra el PDF del guion de director</p>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </div>

        <!-- Controles de Ajuste Agrupados -->
        <div class="controls" id="adjustment-controls" style="display:none;">
            <div class="field">
                <label>Nº Registro (Obligatorio)</label>
                <input type="text" id="reg-number" placeholder="Nombre archivo..." style="width: 140px;">
            </div>
            <div class="field">
                <label>Página</label>
                <input type="number" id="page-number" value="1" readonly style="background:#eee; width: 50px; text-align: center;">
            </div>
            <div class="field">
                <label>Ancho (px)</label>
                <input type="number" id="manual-width" value="800" min="100" style="width: 70px;">
            </div>
            
            <button id="download-btn" class="btn-secondary">Descargar JPG</button>
            <button id="open-selector">Cambiar Página</button>
            <button id="clear-all" class="btn-danger">Limpiar Todo</button>
        </div>

        <!-- Vista previa final -->
        <div class="final-preview" id="preview-area">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <!-- Modal de Selección de Página -->
    <div id="page-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; color: var(--primary);">Selecciona la página del guion</h3>
                <button onclick="closeModal()" class="btn-danger">Cerrar</button>
            </div>
            <div id="grid-preview" class="grid-preview"></div>
        </div>
    </div>

    <script>
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        const mainCanvas = document.getElementById('main-canvas');
        const modal = document.getElementById('page-modal');
        const grid = document.getElementById('grid-preview');
        const pageInput = document.getElementById('page-number');
        const widthInput = document.getElementById('manual-width');
        const regInput = document.getElementById('reg-number');
        const uploadBox = document.getElementById('upload-box');
        const controls = document.getElementById('adjustment-controls');
        const previewArea = document.getElementById('preview-area');
        const dateTimeDisplay = document.getElementById('current-date-time');

        // Función para actualizar fecha y hora
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            dateTimeDisplay.textContent = now.toLocaleDateString('es-ES', options);
        }
        
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Carga de archivo
        document.getElementById('pdf-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfJS.getDocument(arrayBuffer).promise;
                uploadBox.classList.add('hidden');
                controls.style.display = 'flex';
                showPageSelector();
            }
        });

        async function showPageSelector() {
            modal.style.display = 'flex';
            grid.innerHTML = '<p style="text-align:center; padding:20px;">Cargando miniaturas...</p>';
            grid.innerHTML = '';

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 0.3 });
                
                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'page-thumb';
                thumbWrapper.onclick = () => {
                    pageInput.value = i;
                    closeModal();
                    renderFinal();
                };

                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.width = viewport.width;
                thumbCanvas.height = viewport.height;
                await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport }).promise;

                thumbWrapper.appendChild(thumbCanvas);
                const label = document.createElement('span');
                label.innerText = `Pág. ${i}`;
                thumbWrapper.appendChild(label);
                grid.appendChild(thumbWrapper);
            }
        }

        function closeModal() { modal.style.display = 'none'; }

        document.getElementById('open-selector').onclick = () => modal.style.display = 'flex';
        
        // El renderizado se actualiza automáticamente al cambiar el ancho
        widthInput.onchange = () => renderFinal();

        // Eliminar estilo de error al escribir
        regInput.oninput = () => regInput.classList.remove('required-error');

        // Botón Limpiar Todo
        document.getElementById('clear-all').onclick = () => {
            pdfDoc = null;
            document.getElementById('pdf-upload').value = "";
            regInput.value = "";
            regInput.classList.remove('required-error');
            pageInput.value = "1";
            uploadBox.classList.remove('hidden');
            controls.style.display = 'none';
            previewArea.style.display = 'none';
            const ctx = mainCanvas.getContext('2d');
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        };

        async function renderFinal() {
            if (!pdfDoc) return;
            const pageNum = parseInt(pageInput.value);
            const targetWidth = parseInt(widthInput.value);
            
            const page = await pdfDoc.getPage(pageNum);
            const originalViewport = page.getViewport({ scale: 1.0 });
            const scaleFactor = targetWidth / originalViewport.width;
            const scaledViewport = page.getViewport({ scale: scaleFactor });

            mainCanvas.width = scaledViewport.width;
            mainCanvas.height = scaledViewport.height;

            await page.render({ 
                canvasContext: mainCanvas.getContext('2d'), 
                viewport: scaledViewport 
            }).promise;

            previewArea.style.display = 'flex';
        }

        // Descarga de archivo JPG con validación obligatoria
        document.getElementById('download-btn').onclick = () => {
            if (!pdfDoc) return;
            
            const regValue = regInput.value.trim();
            if (!regValue) {
                regInput.classList.add('required-error');
                regInput.focus();
                const errorBox = document.createElement('div');
                errorBox.style.color = 'var(--danger)';
                errorBox.style.fontSize = '0.8rem';
                errorBox.style.marginTop = '5px';
                errorBox.innerText = '⚠️ Debe asignar un número de registro';
                // Evitar duplicados de mensaje
                if (!regInput.parentNode.querySelector('.error-msg')) {
                    errorBox.className = 'error-msg';
                    regInput.parentNode.appendChild(errorBox);
                    setTimeout(() => errorBox.remove(), 3000);
                }
                return;
            }

            const link = document.createElement('a');
            link.download = `${regValue}.jpg`;
            link.href = mainCanvas.toDataURL("image/jpeg", 0.9);
            link.click();
        };
    </script>
</body>
</html>
