<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas - BSMH</title>
    <!-- Cargamos jsPDF desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bsm-blue: #003366;
            --bsm-gold: #c5a059;
            --bsm-gray: #f4f7f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bsm-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        /* Estilo para el reloj/fecha de cabecera */
        .top-bar {
            width: 100%;
            background-color: var(--bsm-blue);
            color: white;
            padding: 10px 20px;
            text-align: right;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }
        h1 {
            font-size: 1.15rem;
            margin: 0;
            color: var(--bsm-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #555;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--bsm-blue);
            box-shadow: 0 0 0 2px rgba(0,51,102,0.1);
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 1.5rem;
        }
        button {
            width: 100%;
            padding: 0.9rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background-color: var(--bsm-blue);
            color: white;
        }
        .btn-primary:hover {
            background-color: #002244;
        }
        .btn-secondary {
            background-color: transparent;
            color: #666;
            border: 1px solid #ddd;
        }
        .btn-secondary:hover {
            background-color: #eee;
            color: #333;
        }
        .footer-note {
            font-size: 0.75rem;
            color: #888;
            margin-top: 1.5rem;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="top-bar" id="live-clock">
    Cargando fecha...
</div>

<div class="card">
    <div class="header">
        <h1>Generador de Etiquetas para inventario</h1>
    </div>

    <div class="form-group">
        <label for="cantidad">Cantidad total de unidades:</label>
        <input type="number" id="cantidad" placeholder="" min="1">
    </div>

    <div class="form-group">
        <label for="fecha">Fecha de registro:</label>
        <!-- Cambiado a type="date" para mostrar el calendario nativo -->
        <input type="date" id="fecha">
    </div>

    <div class="button-group">
        <button class="btn-primary" onclick="generarEtiquetas()">Generar PDF</button>
        <button class="btn-secondary" onclick="window.history.back()">Volver</button>
    </div>

    <div class="footer-note">
        Formato: 50x25mm<br>
        Generador de etiquetas para imprimir y pegar en los artículos del inventario. Optimizado para impresión en A4.
    </div>
</div>

<script>
    // Función para actualizar el reloj y fecha de la cabecera
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('live-clock').textContent = now.toLocaleDateString('es-ES', options);
    }

    // Inicializar fecha actual en el input y reloj
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fecha').value = today;
        
        updateClock();
        setInterval(updateClock, 1000);
    };

    function generarEtiquetas() {
        const { jsPDF } = window.jspdf;
        // Documento A4 vertical
        const doc = new jsPDF('p', 'mm', 'a4');
        
        const cantidad = parseInt(document.getElementById('cantidad').value) || 1;
        const fechaInput = document.getElementById('fecha').value;
        
        // Formatear fecha de YYYY-MM-DD a DD-MM-YYYY para la etiqueta
        let fechaFormateada = "";
        if (fechaInput) {
            const partes = fechaInput.split('-');
            fechaFormateada = `${partes[2]}-${partes[1]}-${partes[0].slice(-2)}`;
        }

        // Medidas en mm
        const eAncho = 50; 
        const eAlto = 25;  
        const margenX = 15;
        const margenY = 20;
        const espaciado = 5; 
        
        const cols = 3;
        const filasPorPagina = 9;
        
        let colActual = 0;
        let filaActual = 0;

        for (let i = 1; i <= cantidad; i++) {
            let x = margenX + (colActual * (eAncho + espaciado));
            let y = margenY + (filaActual * (eAlto + espaciado));

            // Guía de corte (borde gris muy claro)
            doc.setDrawColor(230);
            doc.rect(x, y, eAncho, eAlto);

            // BSMHuelva - X/Total
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.text(`BSMHuelva - ${i}/${cantidad}`, x + (eAncho / 2), y + 10, { align: 'center' });

            // Fecha
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.text(fechaFormateada, x + (eAncho / 2), y + 18, { align: 'center' });

            // Control de rejilla
            colActual++;
            if (colActual >= cols) {
                colActual = 0;
                filaActual++;
            }

            // Salto de página
            if (filaActual >= filasPorPagina && i < cantidad) {
                doc.addPage();
                filaActual = 0;
                colActual = 0;
            }
        }

        doc.save(`Etiquetas_Inventario_${fechaFormateada}.pdf`);
    }
</script>

</body>
</html>
