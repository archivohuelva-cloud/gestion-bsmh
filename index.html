<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - BSMH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bsmh-blue: #0000a0;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 64px;
        }
        
        body {
            background-color: #f1f5f9;
            overflow: hidden; /* Evita scroll en el body principal */
        }

        /* Transiciones suaves para el movimiento del menú */
        aside {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: var(--sidebar-width);
        }

        .sidebar-collapsed {
            width: var(--sidebar-collapsed-width);
        }

        /* Estilo de los botones del menú */
        .sidebar-btn {
            display: flex;
            align-items: center;
            width: calc(100% - 16px);
            padding: 10px 14px;
            color: #cbd5e1;
            font-size: 0.875rem;
            transition: all 0.2s;
            border-radius: 6px;
            margin: 2px 8px;
            white-space: nowrap;
            overflow: hidden;
        }
        
        .sidebar-btn:hover {
            background-color: #334155;
            color: white;
        }
        
        .sidebar-btn.active {
            background-color: #475569;
            color: white;
            font-weight: 600;
        }

        /* Ocultar texto cuando está colapsado */
        .sidebar-collapsed .btn-text,
        .sidebar-collapsed .sidebar-header-text,
        .sidebar-collapsed .footer-text {
            display: none;
        }

        .sidebar-collapsed .sidebar-btn {
            justify-content: center;
            padding: 10px 0;
        }

        .sidebar-collapsed .icon-container {
            margin-right: 0;
        }

        .icon-container {
            flex-shrink: 0;
            width: 20px;
            display: flex;
            justify-content: center;
            margin-right: 12px;
        }

        /* Ajuste del contenedor principal según el menú */
        .main-content {
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-grow: 1;
            height: 100vh;
            position: relative;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botón de toggle flotante o integrado */
        .toggle-btn {
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.2s;
        }
        .toggle-btn:hover {
            background-color: #1e293b;
        }
    </style>
</head>
<body class="flex">

    <!-- Menú Lateral -->
    <aside id="sidebar" class="bg-slate-900 flex flex-col h-screen shadow-xl z-20">
        <!-- Cabecera del Menú -->
        <div class="p-4 flex items-center justify-between border-b border-slate-800 mb-4 h-16">
            <div class="sidebar-header-text flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-700 rounded-md flex items-center justify-center font-bold text-white">B</div>
                <span class="font-bold text-white tracking-tight">BSMH GESTIÓN</span>
            </div>
            <button onclick="toggleSidebar()" class="toggle-btn" title="Expandir/Contraer">
                <svg id="toggle-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                </svg>
            </button>
        </div>

        <!-- Navegación -->
        <nav class="flex-grow overflow-y-auto no-scrollbar">
            
            <button onclick="loadLocalPage('Herramientas BSMH.html', this)" class="sidebar-btn active">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                </div>
                <span class="btn-text">Inicio</span>
            </button>

            <div class="sidebar-header-text px-6 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Operaciones</div>

            <button onclick="loadLocalPage('Calendario Borrador.html', this)" class="sidebar-btn">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </div>
                <span class="btn-text">Calendario</span>
            </button>

            <button onclick="loadLocalPage('Logistica y transporte.html', this)" class="sidebar-btn">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1m-4-1a1 1 0 001 1h1"/></svg>
                </div>
                <span class="btn-text">Logística</span>
            </button>

            <button onclick="loadLocalPage('Tablero Kanban.html', this)" class="sidebar-btn">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                </div>
                <span class="btn-text">Proyectos Kanban</span>
            </button>

            <div class="sidebar-header-text px-6 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Documentación</div>

            <button onclick="loadLocalPage('Rider BSMH.html', this)" class="sidebar-btn">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                </div>
                <span class="btn-text">Rider Escenario</span>
            </button>

            <button onclick="loadLocalPage('Plantilla de percusión.html', this)" class="sidebar-btn">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                </div>
                <span class="btn-text">Plantilla Percusión</span>
            </button>

            <button onclick="loadLocalPage('Etiquetas de carpetas.html', this)" class="sidebar-btn">
                <div class="icon-container">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                </div>
                <span class="btn-text">Etiquetas QR</span>
            </button>
        </nav>

        <div class="p-4 bg-slate-950/40 text-[10px] text-slate-500 border-t border-slate-800">
            <span class="footer-text">Modo Local Activo</span>
            <div class="sidebar-collapsed block h-2 w-2 bg-green-500 rounded-full mx-auto" style="display:none"></div>
        </div>
    </aside>

    <!-- Área de Visualización -->
    <main class="main-content">
        <iframe id="viewer" name="viewer" src="Herramientas BSMH.html"></iframe>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleIcon = document.getElementById('toggle-icon');

        function toggleSidebar() {
            sidebar.classList.toggle('sidebar-collapsed');
            
            // Cambiar icono de dirección
            if (sidebar.classList.contains('sidebar-collapsed')) {
                toggleIcon.innerHTML = '<path d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
            } else {
                toggleIcon.innerHTML = '<path d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>';
            }
        }

        function loadLocalPage(file, element) {
            // Referencia al iframe
            const iframe = document.getElementById('viewer');
            
            // Cambiar el origen
            iframe.src = file;

            // Gestionar clases activas
            document.querySelectorAll('.sidebar-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');

            // Colapsar automáticamente al hacer clic (Tu petición principal)
            if (!sidebar.classList.contains('sidebar-collapsed')) {
                toggleSidebar();
            }
        }

        // Si estamos en móvil, empezar colapsado
        if (window.innerWidth < 768) {
            sidebar.classList.add('sidebar-collapsed');
        }
    </script>
</body>
</html>
