<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Banda Sinfónica Municipal de Huelva - Logística</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <hta:application 
        id="oApp"
        applicationname="GestorTrasladosBSMH"
        border="thin"
        caption="yes"
        showintaskbar="yes"
        singleinstance="yes"
        sysmenu="yes"
        windowstate="normal"
        scroll="yes"
    />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #1a1a1a;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header-table {
            width: 100%;
            border-bottom: 3px solid #003366;
            margin-bottom: 20px;
        }
        h1 {
            color: #003366;
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .admin-panel {
            background: #e9ecef;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: 1px dashed #003366;
        }
        .admin-panel input, .admin-panel select {
            padding: 5px;
            margin-right: 10px;
            border: 1px solid #ccc;
        }

        .info-concierto {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            background: #f8f9fa;
            padding: 20px;
            border: 1px solid #dee2e6;
            margin-bottom: 30px;
        }
        .field {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }
        label {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="date"], input[type="time"] {
            padding: 8px;
            border: 1px solid #ccc;
            background: #fff;
        }

        #input-evento {
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
        }

        .secciones-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        h2 {
            font-size: 16px;
            border-bottom: 2px solid #003366;
            color: #003366;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        
        .columna-items {
            min-height: 50px;
        }

        .item-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            background: white;
        }
        .item-row.dragging { opacity: 0.5; background: #eef2f7; }

        .drag-handle {
            cursor: move;
            color: #999;
            margin-right: 10px;
            font-size: 18px;
            padding: 0 5px;
        }
        
        .btn-delete {
            cursor: pointer;
            margin-left: 15px;
            width: 30px;
            height: 30px;
            border: none;
            background-color: transparent;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="%23cc0000"><path d="M3 6v18h18v-18h-18zm5 14c0 .552-.448 1-1 1s-1-.448-1-1v-10c0-.552.448-1 1-1s1 .448 1 1v10zm5 0c0 .552-.448 1-1 1s-1-.448-1-1v-10c0-.552.448-1 1-1s1 .448 1 1v10zm5 0c0 .552-.448 1-1 1s-1-.448-1-1v-10c0-.552.448-1 1-1s1 .448 1 1v10zm4-18v2h-20v-2h5.711c.9 0 1.631-1.099 1.631-2h5.315c0 .901.73 2 1.631 2h5.712z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 4px;
        }
        .btn-delete:hover {
            background-color: #ffebeb;
        }

        .item-row input[type="checkbox"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .item-name {
            flex-grow: 1;
            font-size: 14px;
            border: 1px solid transparent;
            padding: 2px;
        }
        .item-name:focus {
            background: #fff;
            border: 1px solid #003366;
            outline: none;
        }
        
        .qty-wrapper {
            display: flex;
            align-items: center;
            background: #eee;
            border-radius: 4px;
            border: 1px solid #ccc;
            overflow: hidden;
        }
        .qty-btn {
            width: 24px;
            height: 28px;
            background: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #003366;
        }

        .item-qty {
            width: 35px;
            height: 28px;
            border: none;
            border-left: 1px solid #ccc;
            border-right: 1px solid #ccc;
            text-align: center;
            background: white;
        }
        
        .footer-actions {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: right;
        }
        .main-btn {
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 2px;
        }
        .btn-print { background: #003366; color: white; }
        .btn-add { background: #28a745; color: white; }

        /* Estilos para el texto de impresión con el número a la izquierda */
        .print-line { display: none; font-weight: bold; font-size: 14px; }

        @media print {
            .no-print, .admin-panel, .drag-handle, .btn-delete, .qty-wrapper, input[type="checkbox"], .item-name { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; padding: 0; }
            .item-row { display: none; }
            .item-row.selected { display: flex !important; border-bottom: 1px solid #000; padding: 5px 0; }
            .print-line { display: inline !important; }
            .info-concierto { background: white; border: 1px solid #000; }
            h2 { border-bottom: 1px solid #000; }
            input { border: none !important; color: black !important; font-weight: bold !important; }
        }
    </style>
    <script>
        var defaultInstrumentos = ["Timbales", "Caja", "Bombo", "Platos", "Lira", "Xilófono", "Vibráfono", "Platos", "Campanas Tubulares", "Batería"];
        var defaultLogistica = ["Atriles", "Sillas Negras", "Tarima de Director", "Atril de Director", "Regletas", "Banner BSMH", "Maleta Partituras", "Altavoz"];

        function init() {
            window.resizeTo(1050, 900);
            cargarInventario();
        }

        function guardarInventario() {
            var inst = [];
            var logs = [];
            var instRows = document.getElementById('cont-inst').querySelectorAll('.item-row');
            for(var i=0; i<instRows.length; i++) {
                inst.push(instRows[i].querySelector('.item-name').innerText);
            }
            var logRows = document.getElementById('cont-log').querySelectorAll('.item-row');
            for(var i=0; i<logRows.length; i++) {
                logs.push(logRows[i].querySelector('.item-name').innerText);
            }
            localStorage.setItem('bsmh_inst', JSON.stringify(inst));
            localStorage.setItem('bsmh_log', JSON.stringify(logs));
        }

        function cargarInventario() {
            var inst = JSON.parse(localStorage.getItem('bsmh_inst')) || defaultInstrumentos;
            var logs = JSON.parse(localStorage.getItem('bsmh_log')) || defaultLogistica;
            document.getElementById('cont-inst').innerHTML = "";
            document.getElementById('cont-log').innerHTML = "";
            for(var i=0; i<inst.length; i++) crearFila(inst[i], 'cont-inst');
            for(var j=0; j<logs.length; j++) crearFila(logs[j], 'cont-log');
            setupDragAndDrop();
        }

        function crearFila(nombre, contenedorId) {
            var div = document.createElement('div');
            div.className = 'item-row';
            div.setAttribute('draggable', 'true');
            var q = 1;
            div.innerHTML = 
                '<span class="drag-handle no-print">≡</span>' +
                '<input type="checkbox" class="no-print">' + 
                '<span class="item-name" contenteditable="true" onblur="guardarInventario()">' + nombre + '</span>' + 
                '<div class="qty-wrapper no-print">' +
                    '<button class="qty-btn" onclick="changeQty(this, -1)">-</button>' +
                    '<input type="text" class="item-qty" value="'+q+'" oninput="manualQty(this)">' +
                    '<button class="qty-btn" onclick="changeQty(this, 1)">+</button>' +
                '</div>' +
                '<button class="btn-delete no-print" title="Borrar item" onclick="borrarFila(this)"></button>' +
                '<span class="print-line"></span>';
            document.getElementById(contenedorId).appendChild(div);
        }

        function añadirNuevo() {
            var nombre = document.getElementById('nuevo-nombre').value;
            var tipo = document.getElementById('nuevo-tipo').value;
            if(!nombre) return;
            crearFila(nombre, tipo);
            document.getElementById('nuevo-nombre').value = "";
            guardarInventario();
            setupDragAndDrop();
        }

        function borrarFila(btn) {
            if(confirm("¿Eliminar este elemento permanentemente?")) {
                var fila = btn.parentNode;
                fila.parentNode.removeChild(fila);
                guardarInventario();
            }
        }

        function changeQty(btn, delta) {
            var input = btn.parentNode.querySelector('.item-qty');
            var val = parseInt(input.value) || 0;
            val = Math.max(0, val + delta);
            input.value = val;
            var cb = btn.parentNode.parentNode.querySelector('input[type="checkbox"]');
            cb.checked = (val > 0);
        }

        function manualQty(input) {
            var cb = input.parentNode.parentNode.querySelector('input[type="checkbox"]');
            cb.checked = (parseInt(input.value) > 0);
        }

        function imprimir() {
            var rows = document.querySelectorAll('.item-row');
            var hay = false;
            for(var i=0; i<rows.length; i++) {
                var cb = rows[i].querySelector('input[type="checkbox"]');
                if(cb.checked) {
                    hay = true;
                    rows[i].className = "item-row selected";
                    // Formato solicitado: "4 Timbales"
                    var cant = rows[i].querySelector('.item-qty').value;
                    var nombre = rows[i].querySelector('.item-name').innerText;
                    rows[i].querySelector('.print-line').innerText = cant + " " + nombre;
                } else {
                    rows[i].className = "item-row";
                }
            }
            if(!hay) { alert("Selecciona algo primero."); return; }
            window.print();
        }

        function setupDragAndDrop() {
            var rows = document.querySelectorAll('.item-row');
            [].forEach.call(rows, function(row) {
                row.addEventListener('dragstart', function(e) {
                    dragSrcEl = this;
                    this.classList.add('dragging');
                }, false);
                row.addEventListener('dragover', function(e) { e.preventDefault(); return false; }, false);
                row.addEventListener('drop', function(e) {
                    if (dragSrcEl != this && dragSrcEl.parentNode == this.parentNode) {
                        var container = this.parentNode;
                        var all = Array.prototype.slice.call(container.children);
                        if (all.indexOf(dragSrcEl) < all.indexOf(this)) container.insertBefore(dragSrcEl, this.nextSibling);
                        else container.insertBefore(dragSrcEl, this);
                        guardarInventario();
                    }
                    return false;
                }, false);
                row.addEventListener('dragend', function() { this.classList.remove('dragging'); }, false);
            });
        }
    </script>
</head>
<body onload="init()">

<div class="container">
    <table class="header-table">
        <tr>
            <td><h1>Banda Sinfónica Municipal de Huelva</h1></td>
            <td align="right" style="color: #666; font-size: 11px;">LOGÍSTICA Y TRANSPORTE</td>
        </tr>
    </table>

    <div class="admin-panel no-print">
        <label>Añadir nuevo elemento al inventario:</label><br>
        <input type="text" id="nuevo-nombre" placeholder="Nombre del instrumento o material" style="width: 250px;">
        <select id="nuevo-tipo">
            <option value="cont-inst">Instrumentación</option>
            <option value="cont-log">Material Logístico</option>
        </select>
        <button class="main-btn btn-add" onclick="añadirNuevo()">Añadir a la lista</button>
        <p style="font-size: 10px; margin-top: 5px; color: #666;">* Haz clic en el nombre para modificarlo. Usa la papelera roja para borrar elementos.</p>
    </div>

    <div class="info-concierto">
        <div>
            <div class="field">
                <label>Concierto | Acto</label>
                <input type="text" id="input-evento" placeholder="" oninput="this.value = this.value.toUpperCase()">
            </div>
            <div class="field"><label>Lugar</label><input type="text" placeholder=""></div>
        </div>
        <div>
            <div class="field"><label>Fecha</label><input type="date"></div>
            <div class="field"><label>Hora del transporte</label><input type="time"></div>
        </div>
    </div>

    <div class="secciones-container">
        <div class="columna">
            <h2>Instrumentación</h2>
            <div id="cont-inst" class="columna-items"></div>
        </div>

        <div class="columna">
            <h2>Material Logístico</h2>
            <div id="cont-log" class="columna-items"></div>
        </div>
    </div>

    <div class="footer-actions no-print">
        <button class="main-btn" style="background:#ddd" onclick="if(confirm('¿Restablecer inventario original?')) { localStorage.clear(); location.reload(); }">Restablecer Todo</button>
        <button class="main-btn btn-print" onclick="imprimir()">Imprimir / Generar PDF</button>
    </div>
</div>

</body>
</html>
