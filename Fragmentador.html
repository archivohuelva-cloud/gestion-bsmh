<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Multicanvas A3 de Partituras Continuas</title>
    
    <!-- PDF.js para renderizar PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <!-- Cropper.js para recorte manual avanzado -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- JSZip para compresión y descarga en lote -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- jsPDF para generación unificada de PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e1e; /* Fondo oscuro estilo Photoshop */
            color: #ccc;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        /* HEADER PRINCIPAL */
        header {
            background-color: #2c2c2c;
            border-bottom: 1px solid #1a1a1a;
            color: #e0e0e0;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            font-size: 13px;
        }
        .header-title {
            font-weight: 600;
            margin: 0;
            font-size: 14px;
            color: #fff;
        }
        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* BARRA DE PROPIEDADES (Dinámica estilo Photoshop) */
        .toolbar {
            background-color: #333333;
            border-bottom: 1px solid #222;
            padding: 0 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            height: 38px;
            font-size: 12px;
            color: #d5d5d5;
        }
        
        /* CONTENEDOR PRINCIPAL */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 78px);
            overflow: hidden;
            position: relative;
            background-color: #1a1a1a;
        }

        /* BARRA DE HERRAMIENTAS LATERAL ESTILO PHOTOSHOP */
        #photoshop-toolbox {
            width: 48px;
            background-color: #2b2b2b;
            border-right: 1px solid #1c1c1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 4px;
            z-index: 10;
        }
        .tool-btn {
            width: 36px;
            height: 36px;
            background-color: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            color: #d5d5d5;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .tool-btn:hover {
            background-color: #3d3d3d;
            color: #fff;
        }
        .tool-btn.active {
            background-color: #4a4a4a;
            border-color: #555;
            color: #00bcd4; /* Azul cyan de estado activo */
        }
        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background-color: transparent !important;
        }
        .tool-separator {
            width: 24px;
            height: 1px;
            background-color: #3e3e3e;
            margin: 4px 0;
        }

        /* PANELES LATERALES (IZQUIERDA Y DERECHA) */
        .panel {
            background-color: #2b2b2b;
            color: #b5b5b5;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s, opacity 0.25s;
            overflow: hidden;
            z-index: 5;
            font-size: 12px;
        }
        .panel-header {
            background-color: #222;
            padding: 6px 12px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: #aaa;
            border-bottom: 1px solid #181818;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }
        
        #sidebar-left {
            width: 240px;
            border-right: 1px solid #1c1c1c;
        }
        #sidebar-left.collapsed {
            width: 0px !important;
            padding: 0px !important;
            opacity: 0;
            border-right: none;
        }
        
        #sidebar-right {
            width: 230px;
            border-left: 1px solid #1c1c1c;
        }
        #sidebar-right.collapsed {
            width: 0px !important;
            padding: 0px !important;
            opacity: 0;
            border-left: none;
        }

        /* BOTONES / TIRADORES FLOTANTES PARA RESTAURAR MENÚS LATERALES CONTRÁIDOS */
        .sidebar-restore-btn {
            display: none;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 80px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #bbb;
            cursor: pointer;
            z-index: 100;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
        }
        .sidebar-restore-btn:hover {
            background-color: #00bcd4;
            color: #fff;
        }
        #restore-left-btn {
            left: 50px; /* Ajustado para librar la caja de herramientas vertical izquierda */
            border-left: none;
            border-radius: 0 4px 4px 0;
        }
        #restore-right-btn {
            right: 0;
            border-right: none;
            border-radius: 4px 0 0 4px;
        }

        /* CONTROLES DE ENTRADA */
        .upload-btn {
            border: 1px dashed #555;
            padding: 12px;
            text-align: center;
            background-color: #333;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            color: #ddd;
            font-size: 11px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .upload-btn:hover {
            background-color: #3d3d3d;
            border-color: #777;
        }
        .page-counter {
            background-color: #222;
            padding: 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #aaa;
            text-align: center;
            font-size: 11px;
            border: 1px solid #181818;
        }
        #page-previews {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .preview-item {
            border: 1px solid #3e3e3e;
            padding: 6px;
            background: #222;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .preview-item:hover {
            border-color: #555;
        }
        .preview-item canvas {
            width: 100%;
            max-width: 100%;
            height: auto;
            border: 1px solid #111;
            margin-bottom: 6px;
            display: block;
        }
        .preview-title {
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 4px;
            color: #999;
            width: 100%;
            text-align: center;
        }

        /* GESTOR DE PÁGINAS A3 */
        .a3-page-item {
            padding: 8px 10px;
            border: 1px solid #3e3e3e;
            background-color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
            margin-bottom: 6px;
        }
        .a3-page-item.active {
            background-color: #444;
            color: #fff;
            border-color: #00bcd4;
        }
        .a3-page-item .del-page {
            background: transparent;
            color: #e74c3c;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
        }

        /* PANEL CENTRAL CON ZOOM ADAPTABLE AL MÁXIMO ANCHO DE VENTANA */
        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: flex-start; /* Alineación superior izquierda correcta para soportar scrollbars nativos */
            align-items: flex-start;
            background-color: #1e1e1e; /* Gris Photoshop oscuro */
            overflow: auto; /* Habilita scrollbars cuando el lienzo rebasa la ventana */
            position: relative;
            padding: 40px; /* Margen de respiro estándar para no aprisionar el lienzo */
        }
        #workspace-scaler {
            transform-origin: top left; /* Evita desplazamientos indeseados al cambiar la escala */
            transition: transform 0.05s ease;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #workspace {
            background-color: white;
            position: relative;
            width: 1191px;
            height: 842px;
            overflow: hidden;
        }
        
        /* Línea guía */
        .fold-guide {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 0;
            border-left: 1px dashed #e74c3c;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.7;
        }

        /* Elementos del lienzo */
        .canvas-element {
            position: absolute;
            cursor: move;
            user-select: none;
            box-sizing: border-box;
            border: 1px solid transparent;
        }
        .canvas-element.editing {
            border: 1px solid #00bcd4;
        }
        .canvas-element.erasing {
            cursor: crosshair !important;
        }
        .canvas-element .wrapper-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: relative;
        }
        .canvas-element canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Tiradores de Redimensión */
        .resize-handle {
            display: none;
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #00bcd4;
            border: 1px solid white;
            z-index: 10;
        }
        .canvas-element.editing .resize-handle {
            display: block;
        }
        .handle-se { right: -4px; bottom: -4px; cursor: se-resize; }
        .handle-sw { left: -4px; bottom: -4px; cursor: sw-resize; }
        .handle-ne { right: -4px; top: -4px; cursor: ne-resize; }
        .handle-nw { left: -4px; top: -4px; cursor: nw-resize; }

        /* Elementos de Texto */
        .text-element {
            position: absolute;
            cursor: move;
            padding: 5px;
            border: 1px dashed #999;
            font-family: inherit;
            min-width: 100px;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            z-index: 50;
            box-sizing: border-box;
        }
        .text-element.editing {
            border: 1px solid #2ecc71;
            background: white;
            cursor: text;
        }

        /* Círculo indicador del borrador */
        #eraser-brush-preview {
            display: none;
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px dashed #e67e22;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Botones generales */
        button {
            padding: 4px 10px;
            background-color: #444;
            color: #eee;
            border: 1px solid #555;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        button:hover { background-color: #555; border-color: #666; color: #fff; }
        button:disabled { background-color: #2b2b2b; border-color: #3a3a3a; color: #666; cursor: not-allowed; }
        button.danger { background-color: #c0392b; border-color: #bdc3c7; }
        button.danger:hover { background-color: #e74c3c; }
        
        .tool-control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            border-right: 1px solid #444;
            font-size: 11px;
        }
        .tool-control-group:last-child {
            border-right: none;
        }
        
        .text-style-btn {
            background-color: #333;
            color: #aaa;
            border: 1px solid #444;
            padding: 3px 6px;
            font-size: 10px;
        }
        .text-style-btn.active {
            background-color: #00bcd4;
            color: white;
            border-color: #00bcd4;
        }

        /* Input sliders estilo Photoshop */
        input[type="range"] {
            -webkit-appearance: none;
            background: #444;
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00bcd4;
            cursor: pointer;
        }

        select {
            background-color: #333;
            color: #ddd;
            border: 1px solid #555;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 11px;
            outline: none;
        }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
        }
        .modal-content-wrapper {
            background-color: #222;
            color: #ddd;
            border: 1px solid #444;
            padding: 20px;
            border-radius: 6px;
            width: 80%;
            height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .modal-canvas-container {
            flex: 1;
            width: 100%;
            overflow: auto;
            border: 1px solid #444;
            position: relative;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        #modal-canvas {
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background-color: white;
        }
        .close-modal { align-self: flex-end; background: #e74c3c; margin-bottom: 10px; border: none;}

        /* Flechas de Navegación del Visor PDF */
        .viewer-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: 1px solid #444;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.2s;
        }
        .viewer-nav-btn:hover:not(:disabled) {
            background-color: #00bcd4;
            transform: translateY(-50%) scale(1.05);
        }
        .viewer-nav-btn:disabled {
            background-color: rgba(50, 50, 50, 0.5);
            color: #555;
            border-color: #222;
            cursor: not-allowed;
        }
        .viewer-nav-left { left: 20px; }
        .viewer-nav-right { right: 20px; }

        /* Cropper */
        #cropper-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            flex-direction: column;
            justify-content: center; align-items: center;
        }
        .cropper-wrapper-inner { max-width: 80%; max-height: 70vh; background: white; }
        .cropper-wrapper-inner img { max-width: 100%; max-height: 70vh; }

        /* Elemento de Selección para Borrado de Área */
        #eraser-area-box {
            display: none;
            position: absolute;
            border: 2px dashed #e67e22;
            background-color: rgba(230, 126, 34, 0.25);
            pointer-events: none;
            z-index: 9998;
        }

        /* Estilos drag and drop para las Capas */
        .layer-item {
            transition: transform 0.15s ease, background-color 0.2s;
            user-select: none;
            border-bottom: 1px solid #222;
        }
        .layer-item.dragging {
            opacity: 0.5;
            background-color: #3a3a3a !important;
            border: 1px dashed #00bcd4 !important;
        }
    </style>
</head>
<body>

    <!-- MENÚ SUPERIOR PRINCIPAL (GESTIÓN Y ARCHIVOS) -->
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button onclick="window.history.back()" style="background-color: #3e3e3e;">⬅️ Volver</button>
            <button onclick="createNewProject()" style="background-color: #962d22; border-color: #962d22;">🆕 Nuevo Proyecto</button>
            <span class="header-title">Editor de Partituras - Libreto Continuo A3</span>
        </div>
        <div class="header-actions">
            <button onclick="undo()" title="Deshacer (Ctrl+Z)">↩️ Deshacer</button>
            <button onclick="redo()" title="Rehacer (Ctrl+Y)">↪️ Rehacer</button>
            <button onclick="saveProjectJSON()" style="background-color: #b5690b; border-color: #b5690b;">💾 Guardar JSON</button>
            <button onclick="document.getElementById('json-input').click()" style="background-color: #2980b9; border-color: #2980b9;">📂 Abrir JSON</button>
            <input type="file" id="json-input" accept=".json" style="display: none;" onchange="loadProjectJSON(event)">
            <button onclick="exportWholeProjectZIP()" style="background-color: #27ae60; border-color: #27ae60;">📦 Guardar y Exportar ZIP</button>
        </div>
    </header>

    <!-- BARRA DE OPCIONES DINÁMICAS (ESTILO PHOTOSHOP) -->
    <div class="toolbar">
        <!-- Opciones Globales del Lienzo / Zoom -->
        <div class="tool-control-group">
            <strong>Lienzo:</strong>
            <button onclick="adjustEditorZoom(0.1)" title="Acercar (Flecha Arriba)">➕ Zoom</button>
            <button onclick="adjustEditorZoom(-0.1)" title="Alejar (Flecha Abajo)">➖ Zoom</button>
            <button onclick="resetEditorZoom()" title="Ajustar formato A3 a pantalla">Fit Pantalla</button>
            <span id="editor-zoom-label" style="font-weight: bold; color: #00bcd4;">100%</span>
        </div>

        <!-- Controles dinámicos de herramientas específicas -->
        <div id="dynamic-properties-container" style="display: flex; align-items: center; flex: 1;">
            
            <!-- Propiedades de Imagen / Transformación (se muestran por defecto al seleccionar imagen) -->
            <div id="properties-image" style="display: flex; align-items: center; gap: 15px;">
                <div class="tool-control-group">
                    <strong>Rotación:</strong>
                    <input type="range" id="tool-rotate-slider" min="-180" max="180" value="0" disabled oninput="adjustRotation(this.value)">
                    <span id="rotate-val">0°</span>
                </div>
            </div>

            <!-- Propiedades del Borrador (se muestran al activar borrador) -->
            <div id="properties-eraser" style="display: none; align-items: center; gap: 15px;">
                <div class="tool-control-group">
                    <strong>Borrador:</strong>
                    <select id="eraser-mode" onchange="changeEraserMode(this.value)">
                        <option value="brush">🖌️ Modo Pincel</option>
                        <option value="area">🟩 Modo Área (Cuadro)</option>
                    </select>
                    <span id="eraser-size-container">
                        <label for="eraser-size">Grosor:</label>
                        <input type="range" id="eraser-size" min="5" max="150" value="30" oninput="updateEraserIndicatorSize()">
                    </span>
                </div>
            </div>

            <!-- Propiedades de Texto (se muestran al crear/seleccionar texto) -->
            <div id="properties-text" style="display: none; align-items: center; gap: 15px;">
                <div class="tool-control-group" id="text-tools">
                    <strong>Formato de Texto:</strong>
                    <select id="font-family-select" onchange="adjustFontFamily(this.value)">
                        <option value="Arial">Arial</option>
                        <option value="'Times New Roman', Times, serif">Times New Roman</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="'Courier New', Courier, monospace">Courier New</option>
                        <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                    </select>
                    <label for="font-size-slider">Tamaño:</label>
                    <input type="range" id="font-size-slider" min="12" max="72" value="24" oninput="adjustTextSize(this.value)">
                    <span id="font-size-val">24px</span>
                    
                    <button class="text-style-btn" id="btn-bold" onclick="toggleTextStyle('bold')"><b>B</b></button>
                    <button class="text-style-btn" id="btn-italic" onclick="toggleTextStyle('italic')"><i>I</i></button>
                    <button class="text-style-btn" id="btn-underline" onclick="toggleTextStyle('underline')"><u>U</u></button>
                </div>
            </div>

        </div>

        <span id="edit-indicator" style="margin-left: auto; color: #888; font-style: italic; font-size: 11px;">
            Haz un clic para seleccionar un elemento.
        </span>
    </div>

    <div class="main-container">
        
        <!-- BARRA DE HERRAMIENTAS VERTICAL ESTILO PHOTOSHOP -->
        <div id="photoshop-toolbox">
            <button class="tool-btn active" id="tool-select-btn" onclick="activateSelectTool()" title="Herramienta Selección / Mover (V)">
                🖱️
            </button>
            <div class="tool-separator"></div>
            <button class="tool-btn" id="tool-text-btn" onclick="addTextElement()" title="Herramienta Texto (T)">
                ✍️
            </button>
            <button class="tool-btn" id="tool-crop" onclick="startManualCrop()" disabled title="Recortar Selección (C)">
                ✂️
            </button>
            <button class="tool-btn" id="tool-eraser" onclick="toggleEraser()" title="Borrador (E)">
                🧽
            </button>
            <div class="tool-separator"></div>
            <button class="tool-btn" id="tool-duplicate" onclick="duplicateSelected()" disabled title="Duplicar Selección">
                👥
            </button>
            <button class="tool-btn" id="tool-bring-front" onclick="bringToFront()" disabled title="Traer Selección al Frente">
                🔺
            </button>
            <button class="tool-btn" id="tool-send-back" onclick="sendToBack()" disabled title="Enviar Selección al Fondo">
                🔻
            </button>
            <div class="tool-separator"></div>
            <button class="tool-btn" id="tool-delete" onclick="deleteSelected()" disabled style="color: #e74c3c;" title="Eliminar Selección (Supr)">
                🗑️
            </button>
        </div>

        <!-- Panel Izquierdo: Gestión de PDFs -->
        <div id="sidebar-left" class="panel">
            <div class="panel-header">
                <span>1. Cargar PDFs de Entrada</span>
                <button onclick="toggleSidebar('left')" style="background:transparent; border:none; padding:0; font-size:10px; color: #aaa; cursor:pointer;">◀</button>
            </div>
            <div class="panel-content">
                <div class="upload-btn" onclick="document.getElementById('pdf-input').click()">
                    📂 Abrir Archivo PDF
                    <input type="file" id="pdf-input" accept="application/pdf" style="display: none;" onchange="handlePDFUpload(event)">
                </div>

                <!-- Rango de páginas -->
                <div id="range-insert-container" style="display: none; border: 1px solid #444; padding: 10px; border-radius: 4px; background-color: #222;">
                    <span style="font-weight: bold; font-size: 11px; display: block; margin-bottom: 8px;">Insertar Rango</span>
                    <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                        <input type="number" id="range-start" placeholder="Desde" min="1" style="width: 50%; padding: 4px; font-size: 11px; background:#333; color:#fff; border:1px solid #555;">
                        <input type="number" id="range-end" placeholder="Hasta" min="1" style="width: 50%; padding: 4px; font-size: 11px; background:#333; color:#fff; border:1px solid #555;">
                    </div>
                    <button onclick="insertPageRange()" style="width: 100%; background-color: #8e44ad; border-color: #8e44ad;">➕ Insertar Rango</button>
                </div>

                <div id="page-info" class="page-counter" style="display: none;">
                    Total páginas PDF: <span id="total-pages">0</span>
                </div>
                <div id="page-previews"></div>
            </div>
        </div>

        <!-- BOTONES / PESTAÑAS FLOTANTES PARA RESTAURAR MENÚS LATERALES CONTRÁIDOS (Estilo Photoshop) -->
        <button id="restore-left-btn" class="sidebar-restore-btn" onclick="toggleSidebar('left')" title="Mostrar Barra Izquierda (Flecha Izquierda)">▶</button>
        <button id="restore-right-btn" class="sidebar-restore-btn" onclick="toggleSidebar('right')" title="Mostrar Barra Derecha (Flecha Derecha)">◀</button>

        <!-- Área del Lienzo Autoadaptable -->
        <div id="canvas-container" onclick="deselectAll(event)">
            <div id="workspace-scaler">
                <div id="workspace">
                    <div class="fold-guide"></div>
                    <!-- Selección del área de borrado -->
                    <div id="eraser-area-box"></div>
                </div>
            </div>
        </div>

        <!-- Panel Derecho: Capas y Páginas A3 -->
        <div id="sidebar-right" class="panel">
            <div class="panel-header">
                <button onclick="toggleSidebar('right')" style="background:transparent; border:none; padding:0; font-size:10px; color: #aaa; cursor:pointer;">▶</button>
                <span>Navegación y Capas</span>
            </div>
            <div class="panel-content">
                <span style="font-weight: bold; font-size: 11px;">Páginas A3</span>
                <button onclick="addA3Page()" style="background-color: #8e44ad; border-color: #8e44ad; width: 100%; margin-bottom: 5px;">➕ Añadir Lienzo A3</button>
                <div id="a3-pages-list">
                    <!-- Se llena de forma dinámica -->
                </div>

                <div style="border-top: 1px solid #3e3e3e; margin-top: 5px; padding-top: 10px;">
                    <span style="font-weight: bold; font-size: 11px; display: block; margin-bottom: 8px;">Capas / Elementos</span>
                    <div id="layers-list" style="display: flex; flex-direction: column; gap: 4px; border: 1px solid #444; padding: 4px; border-radius: 4px; background-color: #222; max-height: 280px; overflow-y: auto;">
                        <!-- Se llena de forma dinámica -->
                    </div>
                </div>
                
                <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px;">
                    <button onclick="toggleSidebar('left')" style="width:100%; font-size:10px; background-color: #333;">Toggle Barra Izq.</button>
                    <button onclick="toggleSidebar('right')" style="width:100%; font-size:10px; background-color: #333;">Toggle Barra Der.</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Indicador del círculo del borrador -->
    <div id="eraser-brush-preview"></div>

    <!-- Modales -->
    <div id="cropper-container">
        <div class="cropper-wrapper-inner"><img id="image-to-crop" src=""></div>
        <div style="margin-top: 15px; display: flex; gap: 15px;">
            <button class="danger" onclick="cancelCrop()">Cancelar</button>
            <button onclick="confirmCrop()" style="background-color: #2ecc71; border-color: #2ecc71;">Confirmar Recorte (Intro)</button>
        </div>
    </div>

    <div id="preview-modal" class="modal">
        <button id="viewer-prev" class="viewer-nav-btn viewer-nav-left" onclick="navigatePreview(-1)">◀</button>
        <button id="viewer-next" class="viewer-nav-btn viewer-nav-right" onclick="navigatePreview(1)">▶</button>

        <div class="modal-content-wrapper">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button onclick="adjustPreviewZoom(0.1)" style="background-color: #333;">➕ Zoom</button>
                    <button onclick="adjustPreviewZoom(-0.1)" style="background-color: #333;">➖ Zoom</button>
                    <span id="preview-zoom-label" style="font-weight: bold; font-size: 13px; color: #00bcd4;">100%</span>
                </div>
                <button class="close-modal" onclick="closeFullscreenPreview()">Cerrar [X]</button>
            </div>
            <h3 id="modal-title" style="margin: 5px 0; font-size: 14px;">Vista Previa</h3>
            <div class="modal-canvas-container">
                <canvas id="modal-canvas"></canvas>
            </div>
            <button id="modal-insert-btn" style="background-color: #27ae60; border-color:#27ae60; margin-top: 15px; width: 100%; padding: 8px; font-size:12px;" onclick="insertFromModal()">Insertar en el Lienzo Activo</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null;
        const workspace = document.getElementById('workspace');
        const workspaceScaler = document.getElementById('workspace-scaler');
        const canvasContainer = document.getElementById('canvas-container');
        const brushPreview = document.getElementById('eraser-brush-preview');
        
        let eraserAreaBox = document.getElementById('eraser-area-box');
        
        let selectedElement = null;
        let cropperInstance = null;
        
        // Variables globales del Borrador
        let eraserActive = false;
        let currentEraserMode = 'brush'; 
        let isDrawingEraser = false;
        let eraserStartCoords = { x: 0, y: 0 };

        // Variables del Modal Preview
        let previewZoom = 1.0;
        let activePreviewPageNum = null;

        // Variables de Zoom del Editor Principal
        let scaleFactor = 1.0;
        let customEditorZoom = null; 

        // Contador para la distribución alterna
        let insertedPagesCount = 0;

        // Estructura de Páginas A3
        let pagesA3 = [
            { id: 1, htmlContent: '<div class="fold-guide"></div>' }
        ];
        let activePageId = 1;

        // Historial
        let history = [];
        let historyIndex = -1;

        // ATAJOS DE TECLADO CONFIGURADOS (Tanto para Modal Visor como para Ventana Principal del Editor)
        window.addEventListener('keydown', (e) => {
            const modal = document.getElementById('preview-modal');
            
            // Si el visor de PDFs del modal está activo
            if (modal && modal.style.display === 'flex') {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    navigatePreview(-1);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    navigatePreview(1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    adjustPreviewZoom(0.1);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    adjustPreviewZoom(-0.1);
                }
                return;
            }

            // Evitar conflictos con los comandos de flechas de teclado si el usuario está escribiendo dentro de un campo o texto editable
            if (document.activeElement && (
                document.activeElement.tagName === 'INPUT' || 
                document.activeElement.tagName === 'SELECT' || 
                document.activeElement.tagName === 'TEXTAREA' || 
                document.activeElement.contentEditable === "true" ||
                document.activeElement.classList.contains('text-element')
            )) {
                return;
            }

            // ATAJOS EN VENTANA PRINCIPAL (Flechas de dirección para toggle de barras y zoom progresivo)
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                toggleSidebar('left');
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                toggleSidebar('right');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                adjustEditorZoom(0.05); // Zoom + progresivo
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                adjustEditorZoom(-0.05); // Zoom - progresivo
            }

            // Deshacer / Rehacer estándar con Ctrl
            if (e.ctrlKey) {
                if (e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    undo();
                } else if (e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
        });

        // Guardado de estado
        function saveState() {
            const activePage = pagesA3.find(p => p.id === activePageId);
            if (activePage) {
                activePage.htmlContent = workspace.innerHTML;
            }

            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push(JSON.stringify(pagesA3));
            historyIndex = history.length - 1;
        }

        // REDIMENSIÓN AJUSTADA AL COMPLETO (Se autoadapta a la pantalla del navegador sin márgenes excesivos)
        function resizeWorkspace() {
            if (customEditorZoom !== null) {
                workspaceScaler.style.transform = `scale(${customEditorZoom})`;
                scaleFactor = customEditorZoom;
                document.getElementById('editor-zoom-label').innerText = Math.round(customEditorZoom * 100) + '%';
                return;
            }

            // Espacio disponible real dentro del contenedor del canvas
            const containerWidth = canvasContainer.clientWidth - 40; // Margen de holgura mínimo
            const containerHeight = canvasContainer.clientHeight - 40;
            const baseWidth = 1191;
            const baseHeight = 842;

            const scaleX = containerWidth / baseWidth;
            const scaleY = containerHeight / baseHeight;
            
            // Elegir escala óptima para que quepa de forma completa a lo alto y a lo ancho
            scaleFactor = Math.min(scaleX, scaleY); 
            if (scaleFactor < 0.1) scaleFactor = 0.1;

            workspaceScaler.style.transform = `scale(${scaleFactor})`;
            document.getElementById('editor-zoom-label').innerText = Math.round(scaleFactor * 100) + '%';
        }
        window.addEventListener('resize', resizeWorkspace);
        setTimeout(resizeWorkspace, 100);

        // Ajustar el zoom manual del editor principal
        function adjustEditorZoom(val) {
            if (customEditorZoom === null) {
                customEditorZoom = scaleFactor;
            }
            customEditorZoom = Math.max(0.1, Math.min(5.0, customEditorZoom + val));
            resizeWorkspace();
        }

        // Restablecer el zoom del editor (ajustar a pantalla de forma óptima)
        function resetEditorZoom() {
            customEditorZoom = null;
            resizeWorkspace();
            canvasContainer.scrollLeft = 0;
            canvasContainer.scrollTop = 0;
        }

        // Mostrar / Ocultar Barras Laterales con soporte de restauración (Estilo Photoshop)
        function toggleSidebar(side) {
            if (side === 'left') {
                const sidebar = document.getElementById('sidebar-left');
                const restoreBtn = document.getElementById('restore-left-btn');
                const isCollapsed = sidebar.classList.toggle('collapsed');
                restoreBtn.style.display = isCollapsed ? 'flex' : 'none';
            } else if (side === 'right') {
                const sidebar = document.getElementById('sidebar-right');
                const restoreBtn = document.getElementById('restore-right-btn');
                const isCollapsed = sidebar.classList.toggle('collapsed');
                restoreBtn.style.display = isCollapsed ? 'flex' : 'none';
            }
            setTimeout(resizeWorkspace, 310); 
        }

        // ACCIÓN: Nuevo Proyecto
        function createNewProject() {
            if (confirm("¿Estás seguro de que deseas iniciar un nuevo proyecto? Perderás todos los cambios que no hayas guardado.")) {
                deselectAll();
                currentPdf = null;
                insertedPagesCount = 0;
                
                document.getElementById('pdf-input').value = "";
                document.getElementById('page-info').style.display = 'none';
                document.getElementById('total-pages').innerText = "0";
                document.getElementById('range-insert-container').style.display = 'none';
                document.getElementById('page-previews').innerHTML = "";
                
                pagesA3 = [
                    { id: 1, htmlContent: '<div class="fold-guide"></div>' }
                ];
                activePageId = 1;
                
                history = [];
                historyIndex = -1;
                
                renderA3PagesList();
                loadPageContent();
                saveState();
                resetEditorZoom();
            }
        }

        // GESTIÓN DE PÁGINAS A3
        function renderA3PagesList() {
            const list = document.getElementById('a3-pages-list');
            list.innerHTML = '';
            pagesA3.forEach((page, index) => {
                const div = document.createElement('div');
                div.className = `a3-page-item ${page.id === activePageId ? 'active' : ''}`;
                div.onclick = () => switchA3Page(page.id);
                
                div.innerHTML = `
                    <span>Lienzo A3 - Página ${index + 1}</span>
                    ${pagesA3.length > 1 ? `<button class="del-page" onclick="deleteA3Page(event, ${page.id})">🗑️</button>` : ''}
                `;
                list.appendChild(div);
            });
        }

        function addA3Page() {
            const activePage = pagesA3.find(p => p.id === activePageId);
            if (activePage) {
                activePage.htmlContent = workspace.innerHTML;
            }

            deselectAll();
            const newId = Date.now();
            pagesA3.push({
                id: newId,
                htmlContent: '<div class="fold-guide"></div>'
            });
            activePageId = newId;
            renderA3PagesList();
            loadPageContent();
            saveState();
        }

        function switchA3Page(id) {
            const activePage = pagesA3.find(p => p.id === activePageId);
            if (activePage) {
                activePage.htmlContent = workspace.innerHTML;
            }

            deselectAll();
            activePageId = id;
            renderA3PagesList();
            loadPageContent();
        }

        function deleteA3Page(event, id) {
            event.stopPropagation();
            if (confirm("¿Estás seguro de que deseas eliminar esta página A3 completa?")) {
                deselectAll();
                pagesA3 = pagesA3.filter(p => p.id !== id);
                if (activePageId === id) {
                    activePageId = pagesA3[0].id;
                }
                renderA3PagesList();
                loadPageContent();
                saveState();
            }
        }

        function loadPageContent() {
            const activePage = pagesA3.find(p => p.id === activePageId);
            if (activePage) {
                workspace.innerHTML = activePage.htmlContent;
                
                let box = workspace.querySelector('#eraser-area-box');
                if (!box) {
                    box = document.createElement('div');
                    box.id = 'eraser-area-box';
                    workspace.appendChild(box);
                }
                eraserAreaBox = box;
                eraserAreaBox.style.display = 'none';
                
                const elements = workspace.querySelectorAll('.canvas-element');
                elements.forEach(el => {
                    const canvas = el.querySelector('canvas');
                    if (canvas && canvas.getAttribute('data-img-data')) {
                        const img = new Image();
                        img.onload = function() {
                            const ctx = canvas.getContext('2d');
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0);
                        };
                        img.src = canvas.getAttribute('data-img-data');
                    }
                    makeElementInteractive(el);
                    if (eraserActive) {
                        el.classList.add('erasing');
                    }
                });
                
                const texts = workspace.querySelectorAll('.text-element');
                texts.forEach(txt => bindTextEvents(txt));

                renderLayersList();
            }
        }

        // Subida de PDF
        function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    currentPdf = await pdfjsLib.getDocument(typedarray).promise;
                    document.getElementById('page-info').style.display = 'block';
                    document.getElementById('total-pages').innerText = currentPdf.numPages;
                    document.getElementById('range-insert-container').style.display = 'block';
                    renderPreviews();
                } catch (error) {
                    alert("Error al cargar PDF.");
                }
            };
            fileReader.readAsArrayBuffer(file);
        }

        // Previsualizaciones de PDF
        async function renderPreviews() {
            const previewsContainer = document.getElementById('page-previews');
            previewsContainer.innerHTML = '';

            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 0.3 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;

                const div = document.createElement('div');
                div.className = 'preview-item';
                div.onclick = () => showFullscreenPreview(pageNum);
                div.innerHTML = `
                    <div class="preview-title">Pág. ${pageNum}</div>
                    <div class="btn-group" style="margin-top: 5px; width: 100%;">
                        <button onclick="event.stopPropagation(); addPageToWorkspace(${pageNum})" style="background-color: #2ecc71; border-color: #2ecc71; width: 100%;">➕ Insertar</button>
                    </div>
                `;
                div.insertBefore(canvas, div.querySelector('.preview-title'));
                previewsContainer.appendChild(div);
            }
        }

        // Insertar por rango de páginas de forma masiva
        async function insertPageRange() {
            if (!currentPdf) return;
            const startVal = parseInt(document.getElementById('range-start').value);
            const endVal = parseInt(document.getElementById('range-end').value);

            if (isNaN(startVal) || isNaN(endVal) || startVal < 1 || endVal < startVal || endVal > currentPdf.numPages) {
                alert("Por favor introduce un rango de páginas válido.");
                return;
            }

            for (let pageNum = startVal; pageNum <= endVal; pageNum++) {
                await addPageToWorkspace(pageNum);
            }
        }

        // Mostrar vista previa con Zoom Ajustable
        async function showFullscreenPreview(pageNum) {
            activePreviewPageNum = pageNum;
            previewZoom = 1.0;
            
            const modal = document.getElementById('preview-modal');
            modal.style.display = 'flex';
            
            renderPreviewWithZoom();
            updateNavigationButtons();
        }

        async function renderPreviewWithZoom() {
            if (!currentPdf || !activePreviewPageNum) return;
            const canvas = document.getElementById('modal-canvas');
            const page = await currentPdf.getPage(activePreviewPageNum);
            
            const viewport = page.getViewport({ scale: previewZoom * 1.5 });
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            document.getElementById('modal-title').innerText = `Visualizando Página ${activePreviewPageNum}`;
            document.getElementById('preview-zoom-label').innerText = Math.round(previewZoom * 100) + '%';
        }

        function adjustPreviewZoom(val) {
            previewZoom = Math.max(0.3, Math.min(4.0, previewZoom + val));
            renderPreviewWithZoom();
        }

        function navigatePreview(direction) {
            if (!currentPdf) return;
            let targetPage = activePreviewPageNum + direction;
            if (targetPage >= 1 && targetPage <= currentPdf.numPages) {
                activePreviewPageNum = targetPage;
                renderPreviewWithZoom();
                updateNavigationButtons();
            }
        }

        function updateNavigationButtons() {
            if (!currentPdf) return;
            document.getElementById('viewer-prev').disabled = (activePreviewPageNum <= 1);
            document.getElementById('viewer-next').disabled = (activePreviewPageNum >= currentPdf.numPages);
        }

        function insertFromModal() {
            if (activePreviewPageNum) {
                addPageToWorkspace(activePreviewPageNum);
                closeFullscreenPreview();
            }
        }

        function closeFullscreenPreview() {
            document.getElementById('preview-modal').style.display = 'none';
            activePreviewPageNum = null;
        }

        // Añadir página al lienzo activo
        async function addPageToWorkspace(pageNum) {
            if (!currentPdf) return;

            let targetLeft = 0;
            let targetTop = 0;
            const targetWidth = 595;
            const targetHeight = 842;

            if (insertedPagesCount > 0 && insertedPagesCount % 2 !== 0) {
                targetLeft = 596; 
            } else if (insertedPagesCount > 0 && insertedPagesCount % 2 === 0) {
                addA3Page();
                targetLeft = 0;
            }

            const page = await currentPdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: 2.0 });
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: context, viewport: viewport }).promise;

            canvas.setAttribute('data-img-data', canvas.toDataURL());

            const element = document.createElement('div');
            element.className = 'canvas-element';
            if (eraserActive) element.classList.add('erasing');
            element.style.left = targetLeft + 'px';
            element.style.top = targetTop + 'px';
            element.style.width = targetWidth + 'px';
            element.style.height = targetHeight + 'px';
            element.style.transform = 'rotate(0deg)';
            
            element.setAttribute('data-layer-name', `🖼️ Pág. ${pageNum}`);

            element.innerHTML = `
                <div class="resize-handle handle-nw"></div>
                <div class="resize-handle handle-ne"></div>
                <div class="resize-handle handle-sw"></div>
                <div class="resize-handle handle-se"></div>
                <div class="wrapper-canvas"></div>
            `;

            element.querySelector('.wrapper-canvas').appendChild(canvas);
            workspace.appendChild(element);

            makeElementInteractive(element);
            insertedPagesCount++;
            saveState();
            renderLayersList();
        }

        // Lógica interactiva del Elemento de Imagen
        function makeElementInteractive(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const canvas = element.querySelector('canvas');
            const ctx = canvas.getContext('2d');

            element.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('resize-handle') || eraserActive) return;
                e.stopPropagation();
                
                if (selectedElement !== element) {
                    deselectAll();
                    selectedElement = element;
                    element.classList.add('editing');
                    
                    let currentTransform = element.style.transform || 'rotate(0deg)';
                    let match = currentTransform.match(/rotate\(([^)]+)deg\)/);
                    let currentRotation = match ? parseInt(match[1]) : 0;
                    document.getElementById('tool-rotate-slider').value = currentRotation;
                    document.getElementById('rotate-val').innerText = currentRotation + '°';

                    enableToolbar('image');
                    renderLayersList();
                }

                pos3 = e.clientX;
                pos4 = e.clientY;
                
                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                    saveState();
                };
                
                document.onmousemove = (ev) => {
                    ev.preventDefault();
                    pos1 = (pos3 - ev.clientX) / scaleFactor;
                    pos2 = (pos4 - ev.clientY) / scaleFactor;
                    pos3 = ev.clientX;
                    pos4 = ev.clientY;
                    
                    element.style.top = (element.offsetTop - pos2) + "px";
                    element.style.left = (element.offsetLeft - pos1) + "px";
                };
            });

            const getCanvasCoords = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                const y = (e.clientY - rect.top) * (canvas.height / rect.height);
                return { x, y };
            };

            // Eventos del Borrador
            element.addEventListener('mousedown', (e) => {
                if (!eraserActive) return;
                e.stopPropagation();
                isDrawingEraser = true;

                const coords = getCanvasCoords(e);
                eraserStartCoords = { x: coords.x, y: coords.y, clientX: e.clientX, clientY: e.clientY };

                if (currentEraserMode === 'brush') {
                    drawWhiteEraserBrush(coords.x, coords.y, canvas, ctx);
                } else if (currentEraserMode === 'area') {
                    const workspaceRect = workspace.getBoundingClientRect();
                    const startX = (e.clientX - workspaceRect.left) / scaleFactor;
                    const startY = (e.clientY - workspaceRect.top) / scaleFactor;

                    eraserAreaBox.style.left = startX + 'px';
                    eraserAreaBox.style.top = startY + 'px';
                    eraserAreaBox.style.width = '0px';
                    eraserAreaBox.style.height = '0px';
                    eraserAreaBox.style.display = 'block';
                }
            });

            element.addEventListener('mousemove', (e) => {
                if (!eraserActive) return;
                
                if (currentEraserMode === 'brush') {
                    brushPreview.style.left = e.clientX + 'px';
                    brushPreview.style.top = e.clientY + 'px';
                    if (isDrawingEraser) {
                        const coords = getCanvasCoords(e);
                        drawWhiteEraserBrush(coords.x, coords.y, canvas, ctx);
                    }
                } else if (currentEraserMode === 'area' && isDrawingEraser) {
                    const workspaceRect = workspace.getBoundingClientRect();
                    const startX = (eraserStartCoords.clientX - workspaceRect.left) / scaleFactor;
                    const startY = (eraserStartCoords.clientY - workspaceRect.top) / scaleFactor;
                    const currentX = (e.clientX - workspaceRect.left) / scaleFactor;
                    const currentY = (e.clientY - workspaceRect.top) / scaleFactor;

                    const width = currentX - startX;
                    const height = currentY - startY;

                    eraserAreaBox.style.left = (width < 0 ? currentX : startX) + 'px';
                    eraserAreaBox.style.top = (height < 0 ? currentY : startY) + 'px';
                    eraserAreaBox.style.width = Math.abs(width) + 'px';
                    eraserAreaBox.style.height = Math.abs(height) + 'px';
                }
            });

            const drawWhiteEraserBrush = (x, y, cv, cx) => {
                const brushSize = parseInt(document.getElementById('eraser-size').value) * (cv.width / cv.offsetWidth);
                cx.save();
                cx.fillStyle = '#ffffff';
                cx.beginPath();
                cx.arc(x, y, brushSize / 2, 0, Math.PI * 2, false);
                cx.fill();
                cx.restore();
                cv.setAttribute('data-img-data', cv.toDataURL());
            };

            element.addEventListener('mouseup', (e) => {
                if (!eraserActive || !isDrawingEraser) return;
                isDrawingEraser = false;

                if (currentEraserMode === 'area') {
                    eraserAreaBox.style.display = 'none';
                    const endCoords = getCanvasCoords(e);
                    
                    const x = Math.min(eraserStartCoords.x, endCoords.x);
                    const y = Math.min(eraserStartCoords.y, endCoords.y);
                    const width = Math.abs(endCoords.x - eraserStartCoords.x);
                    const height = Math.abs(endCoords.y - eraserStartCoords.y);

                    ctx.save();
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(x, y, width, height);
                    ctx.restore();
                    
                    canvas.setAttribute('data-img-data', canvas.toDataURL());
                }
                saveState();
            });

            // Escalar tiradores
            const handles = element.querySelectorAll('.resize-handle');
            handles.forEach(handle => {
                handle.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    
                    const isRight = handle.classList.contains('handle-se') || handle.classList.contains('handle-ne');
                    const isBottom = handle.classList.contains('handle-se') || handle.classList.contains('handle-sw');
                    const isLeft = handle.classList.contains('handle-nw') || handle.classList.contains('handle-sw');
                    const isTop = handle.classList.contains('handle-nw') || handle.classList.contains('handle-ne');

                    const startWidth = parseInt(document.defaultView.getComputedStyle(element).width, 10);
                    const startHeight = parseInt(document.defaultView.getComputedStyle(element).height, 10);
                    const aspectRatio = startWidth / startHeight;

                    const startX = e.clientX;
                    const startY = e.clientY;
                    const startLeft = element.offsetLeft;
                    const startTop = element.offsetTop;

                    document.onmousemove = (ev) => {
                        let deltaX = (ev.clientX - startX) / scaleFactor;
                        let deltaY = (ev.clientY - startY) / scaleFactor;

                        let newWidth = startWidth;
                        let newHeight = startHeight;

                        if (ev.shiftKey) {
                            if (isRight) {
                                newWidth = startWidth + deltaX;
                                newHeight = newWidth / aspectRatio;
                            } else if (isLeft) {
                                newWidth = startWidth - deltaX;
                                newHeight = newWidth / aspectRatio;
                            } else if (isBottom) {
                                newHeight = startHeight + deltaY;
                                newWidth = newHeight * aspectRatio;
                            } else if (isTop) {
                                newHeight = startHeight - deltaY;
                                newWidth = newHeight * aspectRatio;
                            }
                        } else {
                            if (isRight) newWidth = startWidth + deltaX;
                            if (isBottom) newHeight = startHeight + deltaY;
                            if (isLeft) newWidth = startWidth - deltaX;
                            if (isTop) newHeight = startHeight - deltaY;
                        }

                        if (newWidth < 30) newWidth = 30;
                        if (newHeight < 30) newHeight = 30;

                        element.style.width = newWidth + 'px';
                        element.style.height = newHeight + 'px';

                        if (isLeft) {
                            element.style.left = (startLeft + (startWidth - newWidth)) + 'px';
                        }
                        if (isTop) {
                            element.style.top = (startTop + (startHeight - newHeight)) + 'px';
                        }
                    };

                    document.onmouseup = () => {
                        document.onmouseup = null;
                        document.onmousemove = null;
                        saveState();
                    };
                });
            });
        }

        // HERRAMIENTA: Añadir Texto
        function addTextElement() {
            if (eraserActive) toggleEraser();
            activateSelectTool();

            const textEl = document.createElement('div');
            textEl.className = 'text-element';
            textEl.contentEditable = "true";
            textEl.innerText = "Doble clic para escribir...";
            textEl.style.left = '100px';
            textEl.style.top = '100px';
            textEl.style.fontSize = '24px';
            textEl.style.color = '#000';
            textEl.style.fontWeight = 'normal';
            textEl.style.fontStyle = 'normal';
            textEl.style.textDecoration = 'none';
            textEl.style.fontFamily = 'Arial';
            textEl.style.transform = 'rotate(0deg)';
            
            textEl.setAttribute('data-layer-name', '✍️ Texto...');

            bindTextEvents(textEl);
            workspace.appendChild(textEl);
            saveState();
            
            deselectAll();
            selectedElement = textEl;
            textEl.style.border = "2px solid #00bcd4";
            enableToolbar('text');
            renderLayersList();
        }

        function bindTextEvents(textEl) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            textEl.addEventListener('mousedown', (e) => {
                if (e.target.closest('#text-tools')) return;
                if (textEl.classList.contains('editing') || eraserActive) return;
                e.stopPropagation();
                deselectAll();
                selectedElement = textEl;
                textEl.style.border = "2px solid #00bcd4";
                enableToolbar('text');
                renderLayersList();

                pos3 = e.clientX;
                pos4 = e.clientY;

                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                    saveState();
                };

                document.onmousemove = (ev) => {
                    ev.preventDefault();
                    pos1 = (pos3 - ev.clientX) / scaleFactor;
                    pos2 = (pos4 - ev.clientY) / scaleFactor;
                    pos3 = ev.clientX;
                    pos4 = ev.clientY;
                    textEl.style.top = (textEl.offsetTop - pos2) + "px";
                    textEl.style.left = (textEl.offsetLeft - pos1) + "px";
                };
            });

            textEl.addEventListener('dblclick', (e) => {
                if (eraserActive) return;
                e.stopPropagation();
                textEl.classList.add('editing');
                textEl.focus();
            });

            textEl.addEventListener('blur', (e) => {
                if (e.relatedTarget && e.relatedTarget.closest('#text-tools')) {
                    textEl.focus();
                    return;
                }
                textEl.classList.remove('editing');
                const snippet = textEl.innerText.substring(0, 15) || 'Texto';
                textEl.setAttribute('data-layer-name', `✍️ ${snippet}...`);
                saveState();
                renderLayersList();
            });
        }

        function adjustFontFamily(font) {
            if (!selectedElement || !selectedElement.classList.contains('text-element')) return;
            selectedElement.style.fontFamily = font;
            saveState();
        }

        function toggleTextStyle(style) {
            if (!selectedElement || !selectedElement.classList.contains('text-element')) return;
            
            if (style === 'bold') {
                const isBold = selectedElement.style.fontWeight === 'bold';
                selectedElement.style.fontWeight = isBold ? 'normal' : 'bold';
                document.getElementById('btn-bold').classList.toggle('active', !isBold);
            } else if (style === 'italic') {
                const isItalic = selectedElement.style.fontStyle === 'italic';
                selectedElement.style.fontStyle = isItalic ? 'normal' : 'italic';
                document.getElementById('btn-italic').classList.toggle('active', !isItalic);
            } else if (style === 'underline') {
                const isUnderline = selectedElement.style.textDecoration === 'underline';
                selectedElement.style.textDecoration = isUnderline ? 'none' : 'underline';
                document.getElementById('btn-underline').classList.toggle('active', !isUnderline);
            }
            saveState();
            selectedElement.focus();
        }

        // Activación de la herramienta de Selección
        function activateSelectTool() {
            if (eraserActive) toggleEraser();
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tool-select-btn').classList.add('active');
        }

        // Habilitar Barra de Herramientas
        function enableToolbar(type) {
            document.getElementById('tool-rotate-slider').disabled = true;
            document.getElementById('tool-crop').disabled = true;
            document.getElementById('tool-delete').disabled = false;
            
            document.getElementById('tool-duplicate').disabled = false;
            document.getElementById('tool-bring-front').disabled = false;
            document.getElementById('tool-send-back').disabled = false;

            document.getElementById('properties-image').style.display = 'none';
            document.getElementById('properties-eraser').style.display = 'none';
            document.getElementById('properties-text').style.display = 'none';

            if (type === 'image') {
                document.getElementById('properties-image').style.display = 'flex';
                document.getElementById('tool-rotate-slider').disabled = false;
                document.getElementById('tool-crop').disabled = false;
                document.getElementById('edit-indicator').innerHTML = "<strong>Edición de Imagen:</strong> Rotación, borrador o recorte.";
            } else if (type === 'text') {
                document.getElementById('properties-text').style.display = 'flex';
                document.getElementById('tool-rotate-slider').disabled = false;
                
                let currentSize = parseInt(selectedElement.style.fontSize) || 24;
                document.getElementById('font-size-slider').value = currentSize;
                document.getElementById('font-size-val').innerText = currentSize + 'px';
                
                document.getElementById('font-family-select').value = selectedElement.style.fontFamily;
                
                document.getElementById('btn-bold').classList.toggle('active', selectedElement.style.fontWeight === 'bold');
                document.getElementById('btn-italic').classList.toggle('active', selectedElement.style.fontStyle === 'italic');
                document.getElementById('btn-underline').classList.toggle('active', selectedElement.style.textDecoration === 'underline');
                
                let currentTransform = selectedElement.style.transform || 'rotate(0deg)';
                let match = currentTransform.match(/rotate\(([^)]+)deg\)/);
                let currentRotation = match ? parseInt(match[1]) : 0;
                document.getElementById('tool-rotate-slider').value = currentRotation;
                document.getElementById('rotate-val').innerText = currentRotation + '°';
                
                document.getElementById('edit-indicator').innerHTML = "<strong>Edición de Texto:</strong> Formato, rotación o arrastre.";
            }
        }

        function deselectAll(e) {
            if (e && e.target.closest('#text-tools, .text-style-btn, select, input, .tool-btn, #photoshop-toolbox')) return;
            if (e && e.target.closest('.canvas-element, .text-element, #layers-list')) return;
            if (selectedElement) {
                selectedElement.classList.remove('editing');
                if (selectedElement.classList.contains('text-element')) {
                    selectedElement.style.border = '1px dashed #7f8c8d';
                }
                selectedElement = null;
                enableToolbar('none');
                
                document.getElementById('properties-image').style.display = 'flex';
                document.getElementById('properties-text').style.display = 'none';

                document.getElementById('tool-delete').disabled = true;
                document.getElementById('tool-duplicate').disabled = true;
                document.getElementById('tool-bring-front').disabled = true;
                document.getElementById('tool-send-back').disabled = true;
                
                document.getElementById('edit-indicator').innerText = "Haz un clic para editar un elemento del lienzo.";
            }
            renderLayersList();
        }

        function adjustTextSize(size) {
            if (!selectedElement || !selectedElement.classList.contains('text-element')) return;
            selectedElement.style.fontSize = size + 'px';
            document.getElementById('font-size-val').innerText = size + 'px';
            saveState();
        }

        function adjustRotation(val) {
            if (!selectedElement) return;
            document.getElementById('rotate-val').innerText = val + '°';
            selectedElement.style.transform = `rotate(${val}deg)`;
            saveState();
        }

        // Recorte con Cropper
        function startManualCrop() {
            if (!selectedElement) return;
            const originalCanvas = selectedElement.querySelector('canvas');
            const cropperContainer = document.getElementById('cropper-container');
            const imageToCrop = document.getElementById('image-to-crop');

            imageToCrop.src = originalCanvas.toDataURL();
            cropperContainer.style.display = 'flex';

            setTimeout(() => {
                cropperInstance = new Cropper(imageToCrop, {
                    autoCropArea: 0.8,
                    viewMode: 1,
                    movable: true, zoomable: true, rotatable: false, scalable: false
                });
            }, 100);
            window.addEventListener('keydown', handleCropKeydown);
        }

        function handleCropKeydown(e) { if (e.key === 'Enter') confirmCrop(); }

        function confirmCrop() {
            if (!cropperInstance || !selectedElement) return;
            const croppedCanvas = cropperInstance.getCroppedCanvas({ imageSmoothingEnabled: true, imageSmoothingQuality: 'high' });
            const wrapper = selectedElement.querySelector('.wrapper-canvas');
            
            croppedCanvas.setAttribute('data-img-data', croppedCanvas.toDataURL());
            wrapper.innerHTML = ''; 
            wrapper.appendChild(croppedCanvas);

            selectedElement.style.width = (croppedCanvas.width / 2) + 'px';
            selectedElement.style.height = (croppedCanvas.height / 2) + 'px';

            makeElementInteractive(selectedElement);
            cancelCrop();
            saveState();
            renderLayersList();
        }

        function cancelCrop() {
            document.getElementById('cropper-container').style.display = 'none';
            if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
            window.removeEventListener('keydown', handleCropKeydown);
        }

        // Control del Borrador Global
        function toggleEraser() {
            deselectAll();
            eraserActive = !eraserActive;
            const btn = document.getElementById('tool-eraser');
            const canvasElements = workspace.querySelectorAll('.canvas-element');

            document.querySelectorAll('.tool-btn').forEach(tb => tb.classList.remove('active'));

            if (eraserActive) {
                btn.classList.add('active');
                canvasElements.forEach(el => el.classList.add('erasing'));
                
                document.getElementById('properties-image').style.display = 'none';
                document.getElementById('properties-text').style.display = 'none';
                document.getElementById('properties-eraser').style.display = 'flex';

                if (currentEraserMode === 'brush') {
                    brushPreview.style.display = 'block';
                    updateEraserIndicatorSize();
                }
            } else {
                document.getElementById('tool-select-btn').classList.add('active');
                brushPreview.style.display = 'none';
                canvasElements.forEach(el => el.classList.remove('erasing'));
                if (eraserAreaBox) eraserAreaBox.style.display = 'none';
                isDrawingEraser = false;

                document.getElementById('properties-eraser').style.display = 'none';
                document.getElementById('properties-image').style.display = 'flex';
            }
        }

        function changeEraserMode(mode) {
            currentEraserMode = mode;
            if (eraserActive && mode === 'brush') {
                brushPreview.style.display = 'block';
                updateEraserIndicatorSize();
            } else {
                brushPreview.style.display = 'none';
            }
        }

        function updateEraserIndicatorSize() {
            if (!eraserActive || currentEraserMode !== 'brush') return;
            const size = parseInt(document.getElementById('eraser-size').value);
            const scaledSize = size * scaleFactor;
            brushPreview.style.width = scaledSize + 'px';
            brushPreview.style.height = scaledSize + 'px';
        }

        function deleteSelected() {
            if (!selectedElement) return;
            selectedElement.remove();
            deselectAll();
            saveState();
            renderLayersList();
        }

        // GESTIÓN DE CAPAS (Photoshop Style)
        function duplicateSelected() {
            if (!selectedElement) return;

            let clone;
            const offsetDistance = 20;

            if (selectedElement.classList.contains('canvas-element')) {
                clone = selectedElement.cloneNode(true);
                
                const srcCanvas = selectedElement.querySelector('canvas');
                const destCanvas = clone.querySelector('canvas');
                if (srcCanvas && destCanvas) {
                    destCanvas.width = srcCanvas.width;
                    destCanvas.height = srcCanvas.height;
                    const destCtx = destCanvas.getContext('2d');
                    destCtx.drawImage(srcCanvas, 0, 0);
                    destCanvas.setAttribute('data-img-data', srcCanvas.toDataURL());
                }

                clone.classList.remove('editing');
                clone.style.left = (parseInt(selectedElement.style.left || 0) + offsetDistance) + 'px';
                clone.style.top = (parseInt(selectedElement.style.top || 0) + offsetDistance) + 'px';
                
                workspace.appendChild(clone);
                makeElementInteractive(clone);
            } else if (selectedElement.classList.contains('text-element')) {
                clone = selectedElement.cloneNode(true);
                clone.classList.remove('editing');
                clone.style.left = (parseInt(selectedElement.style.left || 0) + offsetDistance) + 'px';
                clone.style.top = (parseInt(selectedElement.style.top || 0) + offsetDistance) + 'px';
                
                workspace.appendChild(clone);
                bindTextEvents(clone);
            }

            deselectAll();
            if (clone) {
                selectedElement = clone;
                clone.classList.add('editing');
