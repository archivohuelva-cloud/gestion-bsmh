<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador BSMH - Versión 5.0 (Auto-Modelo)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .loading-spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 20px; height: 20px;
            border-radius: 50%; border-left-color: #ffffff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .platform-card { @apply bg-white p-5 rounded-2xl border-2 border-slate-200 shadow-sm flex flex-col h-full; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Generador BSMH <span class="text-blue-600">v5.0</span></h1>
                <p class="text-slate-500 font-medium mb-2">Gestión de Comunicación - Banda Sinfónica Municipal de Huelva.</p>
                <div id="liveDateTime" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest bg-white inline-block px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm"></div>
            </div>
            <button onclick="resetApp()" class="bg-white text-slate-700 font-bold py-2 px-6 rounded-xl border border-slate-200 hover:bg-slate-50 transition shadow-sm">Limpiar todo</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                    <div class="mb-6">
                        <label class="block text-[11px] font-black uppercase tracking-[0.15em] text-slate-400 mb-3">1. Tipo de Publicación</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setCategory('futuro')" id="btn-futuro" class="category-btn p-3 rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-700 font-bold text-xs transition-all">PRÓXIMO EVENTO</button>
                            <button onclick="setCategory('pasado')" id="btn-pasado" class="category-btn p-3 rounded-xl border-2 border-transparent bg-slate-50 text-slate-500 font-bold text-xs transition-all">ÉXITO / CRÓNICA</button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[11px] font-black uppercase tracking-[0.15em] text-slate-400 mb-3">2. Información del Concierto</label>
                        <textarea id="userInput" rows="10" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none text-sm" placeholder="Escribe los detalles aquí..."></textarea>
                    </div>
                    
                    <button id="generateBtn" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg">
                        <span id="btnText">Generar Textos</span>
                        <div id="loader" class="loading-spinner hidden"></div>
                    </button>

                    <div id="errorDisplay" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-2xl border border-red-100">
                        <p class="text-xs font-bold mb-1">Error detectado:</p>
                        <p id="errorSub" class="text-[10px] font-mono break-words"></p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="resultsArea" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
                    <div class="platform-card border-blue-100">
                        <div class="flex justify-between items-center mb-4 text-blue-700 font-black text-xs italic">FACEBOOK <button onclick="copy('fb-text', event)" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg not-italic">COPIAR</button></div>
                        <div id="fb-text" class="text-[13px] text-slate-700 whitespace-pre-wrap bg-slate-50 p-4 rounded-xl flex-grow overflow-auto max-h-[250px]"></div>
                    </div>
                    <div class="platform-card border-pink-100">
                        <div class="flex justify-between items-center mb-4 text-pink-600 font-black text-xs italic">INSTAGRAM <button onclick="copy('ig-text', event)" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg not-italic">COPIAR</button></div>
                        <div id="ig-text" class="text-[13px] text-slate-700 whitespace-pre-wrap bg-slate-50 p-4 rounded-xl flex-grow overflow-auto max-h-[250px]"></div>
                    </div>
                    <div class="platform-card border-slate-200">
                        <div class="flex justify-between items-center mb-4 text-slate-900 font-black text-xs italic">X (TWITTER) <button onclick="copy('x-text', event)" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg not-italic">COPIAR</button></div>
                        <div id="x-text" class="text-[13px] text-slate-700 whitespace-pre-wrap bg-slate-50 p-4 rounded-xl flex-grow overflow-auto max-h-[200px]"></div>
                    </div>
                    <div class="platform-card border-emerald-100">
                        <div class="flex justify-between items-center mb-4 text-emerald-700 font-black text-xs italic">WHATSAPP <button onclick="copy('wa-text', event)" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg not-italic">COPIAR</button></div>
                        <div id="wa-text" class="text-[13px] text-slate-700 whitespace-pre-wrap bg-slate-50 p-4 rounded-xl flex-grow overflow-auto max-h-[200px]"></div>
                    </div>
                </div>

                <div id="emptyPlaceholder" class="h-full min-h-[400px] flex flex-col items-center justify-center p-12 text-slate-300 border-4 border-dashed border-slate-100 rounded-[40px] bg-white text-center">
                    <p class="text-lg font-bold">Sin contenido</p>
                    <p class="text-sm">Rellena los datos y pulsa el botón negro.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyC2-BACX3aWpA0W00kpB4VEjbfmF3m2aHo"; 
        let currentCategory = 'futuro';

        const dom = {
            btn: document.getElementById('generateBtn'),
            btnText: document.getElementById('btnText'),
            input: document.getElementById('userInput'),
            loader: document.getElementById('loader'),
            results: document.getElementById('resultsArea'),
            empty: document.getElementById('emptyPlaceholder'),
            error: document.getElementById('errorDisplay'),
            errorSub: document.getElementById('errorSub')
        };

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('border-blue-600', 'bg-blue-50', 'text-blue-700');
                b.classList.add('border-transparent', 'bg-slate-50', 'text-slate-500');
            });
            document.getElementById(`btn-${cat}`).classList.add('border-blue-600', 'bg-blue-50', 'text-blue-700');
        }

        // Esta función averigua qué modelos permite tu clave API para no usar uno prohibido
        async function getBestAvailableModel() {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!res.ok) throw new Error("Fallo al verificar modelos");
                const data = await res.json();
                
                // Filtramos los modelos que admiten generación de texto
                const available = data.models
                    .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'))
                    .map(m => m.name.replace('models/', ''));

                // Prioridades de modelos (del mejor/más moderno al más antiguo)
                const preferences =["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash", "gemini-1.5-pro", "gemini-pro"];
                
                for (let pref of preferences) {
                    if (available.includes(pref)) return pref;
                }
                
                // Si ninguno coincide, usa el primero que tenga "gemini"
                return available.find(m => m.includes("gemini")) || "gemini-pro";
            } catch (e) {
                console.warn("No se pudo detectar el modelo, usando predeterminado.", e);
                return "gemini-pro"; // Fallback seguro universal
            }
        }

        async function generate() {
            const textData = dom.input.value.trim();
            if (!textData) return;

            dom.btn.disabled = true;
            dom.loader.classList.remove('hidden');
            dom.error.classList.add('hidden');
            dom.btnText.textContent = "Buscando acceso...";

            try {
                // 1. Encontrar el modelo que SÍ funcione con tu clave
                const targetModel = await getBestAvailableModel();
                console.log("Generando con el modelo:", targetModel);
                dom.btnText.textContent = "Redactando textos...";

                // 2. Instrucciones blindadas
                const prompt = `Actúa como Responsable de Comunicación de la Banda Sinfónica Municipal de Huelva. 
                DATOS DEL EVENTO: "${textData}"
                TIPO DE POST: ${currentCategory === 'futuro' ? 'Invitación/Próximo evento' : 'Crónica de éxito/Pasado'}
                
                IMPORTANTE: Devuelve ÚNICAMENTE un objeto JSON. No escribas texto antes ni después. No uses etiquetas markdown como \`\`\`json.
                ESTRUCTURA EXACTA:
                {
                  "facebook": "texto para facebook...",
                  "instagram": "texto para instagram con #hashtags...",
                  "x": "texto corto max 270 chars...",
                  "whatsapp": "texto directo para whatsapp..."
                }`;

                // 3. Petición a la API con el modelo correcto
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents:[{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    const errObj = await response.json();
                    throw new Error(errObj.error.message || "Error en el servidor");
                }
                
                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                
                // 4. Extracción segura de JSON (por si la IA se salta las instrucciones)
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                const firstBrace = rawText.indexOf('{');
                const lastBrace = rawText.lastIndexOf('}');
                
                if (firstBrace !== -1 && lastBrace !== -1) {
                    rawText = rawText.substring(firstBrace, lastBrace + 1);
                }

                const content = JSON.parse(rawText);

                // 5. Mostrar resultados
                dom.empty.classList.add('hidden');
                dom.results.classList.remove('hidden');

                document.getElementById('fb-text').textContent = content.facebook;
                document.getElementById('ig-text').textContent = content.instagram;
                document.getElementById('x-text').textContent = content.x;
                document.getElementById('wa-text').textContent = content.whatsapp;

            } catch (err) {
                dom.errorSub.textContent = err.message;
                dom.error.classList.remove('hidden');
                console.error(err);
            } finally {
                dom.btn.disabled = false;
                dom.loader.classList.add('hidden');
                dom.btnText.textContent = "Generar Textos";
            }
        }

        function copy(id, e) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = e.target;
                const original = btn.textContent;
                btn.textContent = "¡COPIADO!";
                btn.classList.add('bg-green-500', 'text-white');
                setTimeout(() => {
                    btn.textContent = original;
                    btn.classList.remove('bg-green-500', 'text-white');
                }, 1000);
            });
        }

        function resetApp() { location.reload(); }
        dom.btn.addEventListener('click', generate);
        document.getElementById('liveDateTime').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
