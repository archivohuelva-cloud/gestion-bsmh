<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador BSMH - Versión 3.7 (Estabilidad Total)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .loading-spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border-left-color: #ffffff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .counter-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; transition: all 0.3s; }
        .platform-card { @apply bg-white p-5 rounded-2xl border-2 border-slate-200 shadow-sm flex flex-col h-full; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Generador BSMH <span class="text-blue-600">v3.7</span></h1>
                <p class="text-slate-500 font-medium mb-2">Banda Sinfónica Municipal de Huelva - Publicaciones Oficiales.</p>
                <div id="liveDateTime" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest bg-white inline-block px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm"></div>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="bg-slate-100 text-slate-700 font-bold py-2 px-6 rounded-xl border border-slate-200 hover:bg-slate-200 transition shadow-sm flex items-center">Inicio</a>
                <button onclick="resetApp()" class="bg-white text-slate-700 font-bold py-2 px-6 rounded-xl border border-slate-200 hover:bg-slate-50 transition shadow-sm">Reiniciar</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Columna Izquierda: Input -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                    <div class="mb-6">
                        <label class="block text-[11px] font-black uppercase tracking-[0.15em] text-slate-400 mb-3">1. Tiempo de Publicación</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setCategory('futuro')" id="btn-futuro" class="category-btn p-3 rounded-xl border-2 border-blue-600 bg-blue-50 text-blue-700 font-bold text-xs transition-all">PRÓXIMO EVENTO</button>
                            <button onclick="setCategory('pasado')" id="btn-pasado" class="category-btn p-3 rounded-xl border-2 border-transparent bg-slate-50 text-slate-500 font-bold text-xs transition-all">CRÓNICA / ÉXITO</button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[11px] font-black uppercase tracking-[0.15em] text-slate-400 mb-3">2. Información del Concierto</label>
                        <textarea id="userInput" rows="16" 
                            class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none text-sm leading-relaxed transition-all min-h-[350px]"
                            placeholder="Introduce aquí: Título, obras, director, solistas, fecha, lugar, entradas..."></textarea>
                    </div>
                    
                    <button id="generateBtn" 
                        class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-3 transition-all transform active:scale-95 shadow-lg shadow-slate-900/20">
                        <span id="btnText">Generar Textos</span>
                        <div id="loader" class="loading-spinner hidden"></div>
                    </button>

                    <div id="errorDisplay" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-2xl border border-red-100">
                        <p class="text-xs font-bold mb-1">Error de Generación</p>
                        <p id="errorSub" class="text-[10px] font-mono opacity-80 break-words"></p>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Resultados -->
            <div class="lg:col-span-8">
                <div id="resultsArea" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
                    <!-- Facebook -->
                    <div class="platform-card border-blue-200">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-blue-700 font-black text-xs tracking-tighter italic flex items-center gap-2">FACEBOOK</span>
                            <button onclick="copy('fb-text', event)" class="text-[10px] font-bold bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition">COPIAR</button>
                        </div>
                        <div id="fb-text" class="text-[13px] leading-relaxed text-slate-700 whitespace-pre-wrap bg-slate-50/50 p-4 rounded-xl border border-slate-100 flex-grow overflow-auto max-h-[350px]"></div>
                        <div class="mt-4 flex justify-end"><span id="fb-count" class="counter-badge bg-slate-100 text-slate-500">0</span></div>
                    </div>

                    <!-- Instagram -->
                    <div class="platform-card border-pink-200">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-pink-600 font-black text-xs tracking-tighter italic flex items-center gap-2">INSTAGRAM</span>
                            <button onclick="copy('ig-text', event)" class="text-[10px] font-bold bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-pink-100 transition">COPIAR</button>
                        </div>
                        <div id="ig-text" class="text-[13px] leading-relaxed text-slate-700 whitespace-pre-wrap bg-slate-50/50 p-4 rounded-xl border border-slate-100 flex-grow overflow-auto max-h-[350px]"></div>
                        <div class="mt-4 flex justify-end"><span id="ig-count" class="counter-badge bg-slate-100 text-slate-500">0</span></div>
                    </div>

                    <!-- X -->
                    <div class="platform-card border-slate-900">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-slate-900 font-black text-xs tracking-tighter italic flex items-center gap-2">X (TWITTER)</span>
                            <button onclick="copy('x-text', event)" class="text-[10px] font-bold bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-slate-200 transition">COPIAR</button>
                        </div>
                        <div id="x-text" class="text-[13px] leading-relaxed text-slate-700 whitespace-pre-wrap bg-slate-50/50 p-4 rounded-xl border border-slate-100 flex-grow overflow-auto"></div>
                        <div class="mt-4 flex justify-end"><span id="x-count" class="counter-badge">0 / 280</span></div>
                    </div>

                    <!-- WhatsApp -->
                    <div class="platform-card border-emerald-500">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-emerald-700 font-black text-xs tracking-tighter italic flex items-center gap-2">WHATSAPP</span>
                            <button onclick="copy('wa-text', event)" class="text-[10px] font-bold bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-emerald-100 transition">COPIAR</button>
                        </div>
                        <div id="wa-text" class="text-[13px] leading-relaxed text-slate-700 whitespace-pre-wrap bg-slate-50/50 p-4 rounded-xl border border-slate-100 flex-grow overflow-auto"></div>
                        <div class="mt-4 flex justify-end"><span id="wa-count" class="counter-badge bg-slate-100 text-slate-500">0</span></div>
                    </div>
                </div>

                <div id="emptyPlaceholder" class="h-full min-h-[500px] flex flex-col items-center justify-center p-12 text-slate-300 border-4 border-dashed border-slate-100 rounded-[40px] bg-white transition-all">
                    <svg class="w-16 h-16 mb-6 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2zM14 4v4h4"></path></svg>
                    <p class="text-lg font-bold tracking-tight">Esperando información</p>
                    <p class="text-sm">Rellena los datos para generar las publicaciones.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let currentCategory = 'futuro';

        const dom = {
            btn: document.getElementById('generateBtn'),
            input: document.getElementById('userInput'),
            loader: document.getElementById('loader'),
            btnText: document.getElementById('btnText'),
            results: document.getElementById('resultsArea'),
            empty: document.getElementById('emptyPlaceholder'),
            error: document.getElementById('errorDisplay'),
            errorSub: document.getElementById('errorSub')
        };

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('liveDateTime').textContent = now.toLocaleDateString('es-ES', options);
        }
        updateDateTime();
        setInterval(updateDateTime, 60000);

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('border-blue-600', 'bg-blue-50', 'text-blue-700');
                b.classList.add('border-transparent', 'bg-slate-50', 'text-slate-500');
            });
            const active = document.getElementById(`btn-${cat}`);
            active.classList.replace('border-transparent', 'border-blue-600');
            active.classList.replace('bg-slate-50', 'bg-blue-50');
            active.classList.replace('text-slate-500', 'text-blue-700');
        }

        function resetApp() {
            dom.input.value = "";
            dom.results.classList.add('hidden');
            dom.empty.classList.remove('hidden');
            dom.error.classList.add('hidden');
            dom.loader.classList.add('hidden');
            dom.btnText.textContent = "Generar Textos";
            dom.btn.disabled = false;
        }

        async function generate() {
            const val = dom.input.value.trim();
            if (!val) return;

            dom.btn.disabled = true;
            dom.loader.classList.remove('hidden');
            dom.btnText.textContent = "Generando...";
            dom.error.classList.add('hidden');

            const isFuturo = currentCategory === 'futuro';

            const systemPrompt = `Eres el Responsable de Comunicación de la Banda Sinfónica Municipal de Huelva.
NORMAS ESTRICTAS:
1. Tono formal, institucional, orgulloso de Huelva.
2. TIEMPO VERBAL: ${isFuturo ? 'PRESENTE/FUTURO (es una invitación)' : 'PASADO (es una crónica de éxito)'}.
3. FORMATO: Incluye EMOJIS pertinentes y SALTOS DE PÁRRAFO (\n) para legibilidad.
4. CARACTERES: NUNCA uses comillas dobles (") dentro del texto de la publicación, usa comillas simples (').
5. REDES: 
   - Facebook e Instagram: Detallados con hashtags al final.
   - X: Máximo 275 caracteres, SIN hashtags.
   - WhatsApp: Formato directo y claro, SIN hashtags.
6. RESPUESTA: Devuelve EXCLUSIVAMENTE un objeto JSON válido.`;

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Datos del evento: ${val}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.1,
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    facebook: { type: "STRING" },
                                    instagram: { type: "STRING" },
                                    x: { type: "STRING" },
                                    whatsapp: { type: "STRING" }
                                },
                                required: ["facebook", "instagram", "x", "whatsapp"]
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                const rawResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!rawResponse) throw new Error("La API devolvió una respuesta vacía.");

                // LIMPIEZA DE SEGURIDAD PARA EL JSON
                let cleanJsonString = rawResponse;
                // Si la IA incluyó bloques de código ```json ... ```
                if (cleanJsonString.includes('```')) {
                    const match = cleanJsonString.match(/\{[\s\S]*\}/);
                    if (match) cleanJsonString = match[0];
                }

                const content = JSON.parse(cleanJsonString);

                dom.empty.classList.add('hidden');
                dom.results.classList.remove('hidden');

                render('fb', content.facebook);
                render('ig', content.instagram);
                render('x', content.x);
                render('wa', content.whatsapp);

            } catch (err) {
                console.error(err);
                dom.errorSub.textContent = `Error: ${err.message}. Reintenta o revisa los datos introducidos.`;
                dom.error.classList.remove('hidden');
            } finally {
                dom.btn.disabled = false;
                dom.loader.classList.add('hidden');
                dom.btnText.textContent = "Generar Textos";
            }
        }

        async function fetchWithRetry(url, opts, retries = 3) {
            try {
                const res = await fetch(url, opts);
                if (res.status === 429 && retries > 0) {
                    await new Promise(r => setTimeout(r, 2000));
                    return fetchWithRetry(url, opts, retries - 1);
                }
                return res;
            } catch (e) {
                if (retries > 0) return fetchWithRetry(url, opts, retries - 1);
                throw e;
            }
        }

        function render(id, text) {
            const box = document.getElementById(`${id}-text`);
            const count = document.getElementById(`${id}-count`);
            box.textContent = text || "";
            const len = (text || "").length;
            if (id === 'x') {
                count.textContent = `${len} / 280`;
                count.className = len > 280 ? "counter-badge bg-red-500 text-white" : "counter-badge bg-slate-900 text-white";
            } else {
                count.textContent = `${len} caracteres`;
            }
        }

        function copy(id, event) {
            const text = document.getElementById(id).textContent;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = event.currentTarget;
            btn.textContent = "¡COPIADO!";
            btn.classList.replace('bg-slate-100', 'bg-green-500');
            btn.classList.add('text-white');
            setTimeout(() => {
                btn.textContent = "COPIAR";
                btn.classList.replace('bg-green-500', 'bg-slate-100');
                btn.classList.remove('text-white');
            }, 1200);
        }

        dom.btn.addEventListener('click', generate);
    </script>
</body>
</html>
