<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - BSMH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bsmh-blue: #0000a0;
        }
        
        body {
            background-color: #f1f5f9;
        }

        /* Estilo de los botones del menú */
        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 16px;
            color: #cbd5e1;
            font-size: 0.875rem;
            transition: all 0.2s;
            border-radius: 6px;
            margin-bottom: 2px;
        }
        
        .sidebar-btn:hover {
            background-color: #334155;
            color: white;
        }
        
        .sidebar-btn.active {
            background-color: #475569;
            color: white;
            font-weight: 600;
        }

        /* Contenedor del Iframe */
        .iframe-container {
            flex-grow: 1;
            height: 100vh;
            background: white;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Scrollbar personalizado para el menú */
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden font-sans">

    <!-- Menú Lateral (Sidebar) -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-20 border-r border-slate-700">
        <div class="p-5 border-b border-slate-800 bg-slate-900/50">
            <h1 class="text-lg font-bold tracking-tight text-white">BSMH</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-widest mt-1">Gestión Interna Local</p>
        </div>
        
        <nav class="flex-1 overflow-y-auto no-scrollbar p-3">
            <div class="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Organización</div>
            <button onclick="loadLocalPage('Calendario Borrador.html', this)" class="sidebar-btn active">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Calendario
            </button>
            <button onclick="loadLocalPage('Tablero Kanban.html', this)" class="sidebar-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Tablero Kanban
            </button>
            <button onclick="loadLocalPage('Tareas.html', this)" class="sidebar-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                Lista de Tareas
            </button>

            <div class="px-3 mt-6 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Producción</div>
            <button onclick="loadLocalPage('Rider BSMH.html', this)" class="sidebar-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Escenario (Rider)
            </button>
            <button onclick="loadLocalPage('Logistica y transporte.html', this)" class="sidebar-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                Logística
            </button>
            <button onclick="loadLocalPage('Plantilla de percusión.html', this)" class="sidebar-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                Percusión
            </button>

            <div class="px-3 mt-6 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Otros</div>
            <button onclick="loadLocalPage('Etiquetas de carpetas.html', this)" class="sidebar-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                Etiquetas QR
            </button>
        </nav>

        <div class="p-4 bg-slate-950/40 text-[10px] text-slate-500 border-t border-slate-800">
            Modo Local Activo
        </div>
    </aside>

    <!-- Área de Visualización -->
    <main class="iframe-container">
        <iframe id="viewer" name="viewer" src="about:blank"></iframe>
    </main>

    <script>
        function loadLocalPage(file, element) {
            // Referencia al iframe
            const iframe = document.getElementById('viewer');
            
            // Cambiar el origen (sin rutas complejas para evitar bloqueos file://)
            iframe.src = file;

            // Gestionar clases activas
            document.querySelectorAll('.sidebar-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');
        }

        // Cargar por defecto la primera página
        window.addEventListener('DOMContentLoaded', () => {
            const defaultPage = 'Calendario Borrador.html';
            document.getElementById('viewer').src = defaultPage;
        });
    </script>
</body>
</html>
