<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión BSMH - iPad & PC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; box-sizing: border-box; }
        body { margin: 10px; background-color: #f0f0f7; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 950px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-title { text-align: center; color: #004481; margin-bottom: 20px; font-size: 22px; font-weight: bold; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
        
        .info-item { display: flex; align-items: center; border-bottom: 1px solid #e5e5ea; padding: 8px 0; }
        .info-item label { font-weight: bold; font-size: 13px; width: 90px; color: #004481; flex-shrink: 0; }
        input[type="text"], input[type="date"], input[type="time"], textarea { width: 100%; border: none; font-size: 16px; background: transparent; outline: none; color: #1c1c1e; }
        textarea { border-bottom: 1px solid #e5e5ea; margin-top: 10px; resize: none; width: 100%; }
        
        .section-header { background: #f2f2f7; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; border-radius: 8px; margin: 20px 0 10px 0; border-left: 5px solid #004481; }
        .count-badge { background: #004481; color: white; padding: 3px 10px; border-radius: 12px; font-size: 14px; }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; min-width: 500px; }
        
        th { font-size: 11px; color: #8e8e93; text-transform: uppercase; padding: 10px; text-align: center; }
        td { padding: 12px 5px; border-bottom: 1px solid #f2f2f7; text-align: center; font-size: 15px; }
        .row-base { background-color: #f0f7ff; } 
        .row-refuerzo { background-color: #fff9f0; }
        .inst-name { text-align: left; font-weight: 600; width: 30%; color: #1c1c1e; min-width: 120px; }
        
        .stepper { display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-step { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #007aff; background: white; font-size: 20px; font-weight: bold; color: #007aff; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation; }
        input[type="number"].qty-input { width: 40px; text-align: center; font-size: 18px; font-weight: bold; border: none; background: transparent; color: #1c1c1e; -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .desglose-container { margin-top: 25px; padding: 15px; border: 2px solid #004481; border-radius: 12px; background-color: #fcfcfd; }
        .desglose-title { margin: 0 0 10px 0; color: #004481; font-size: 16px; text-transform: uppercase; border-bottom: 1px solid #004481; padding-bottom: 5px; }
        
        .grid-agrupado { display: flex; flex-flow: row wrap; gap: 5px; }
        .item-agrupado { font-size: 14px; padding: 6px 10px; width: calc(33.33% - 5px); border-bottom: 1px solid #eee; }
        @media (max-width: 768px) { .item-agrupado { width: calc(50% - 5px); } }
        @media (max-width: 480px) { .item-agrupado { width: 100%; } }

        .resumen { background: #004481; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-top: 15px; font-size: 17px; line-height: 1.6; }
        
        .actions { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button.main-btn { padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; touch-action: manipulation; }
        .btn-print { background: #34c759; }
        .btn-pdf { background: #007aff; }
        .btn-clear { background: #ff3b30; }
        .btn-back { background: #8e8e93; }
        
        .add-panel { background: #e5e5ea; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .add-panel-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .add-panel-controls input, .add-panel-controls select { flex: 1; min-width: 150px; background: white; border-radius: 8px; padding: 12px; border: 1px solid #ccc; font-size: 16px; }

        @media print { .no-print { display: none !important; } .container { box-shadow: none; border: none; width: 100%; } .grid-agrupado { display: block; } .item-agrupado { width: 50%; display: inline-block; } }
    </style>
</head>
<body>

<div class="container" id="contenido-pdf">
    <h2 class="header-title">BANDA SINFÓNICA MUNICIPAL DE HUELVA</h2>
    
    <div class="info-grid">
        <div class="info-item"><label>TÍTULO:</label> <input type="text" placeholder=""></div>
        <div class="info-item"><label>FECHA:</label> <input type="date" id="fecha-actual"></div>
        <div class="info-item"><label>UBICACIÓN:</label> <input type="text" placeholder=""></div>
        <div class="info-item"><label>HORA:</label> <input type="time" id="hora-actual"></div>
    </div>
    
    <textarea rows="2" placeholder="Observaciones"></textarea>

    <div class="section-header">
        <span>BSMHuelva</span>
        <span class="count-badge">Componentes: <span id="subtotal-comp-base">0</span></span>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="no-print" style="width:40px"></th>
                    <th style="text-align:left">Instrumento</th>
                    <th>Componentes</th>
                    <th>Atriles</th>
                    <th>Sillas</th>
                    <th class="no-print"></th>
                </tr>
            </thead>
            <tbody id="tabla-base"></tbody>
        </table>
    </div>

    <div class="section-header">
        <span>REFUERZOS</span>
        <span class="count-badge">Componentes: <span id="subtotal-comp-ref">0</span></span>
    </div>
    <div class="table-responsive">
        <table>
            <tbody id="tabla-refuerzo"></tbody>
        </table>
    </div>

    <div class="desglose-container">
        <h4 class="desglose-title">Listado Total de Instrumentos</h4>
        <div id="lista-agrupada" class="grid-agrupado"></div>
    </div>

    <div class="resumen" id="resumen-final">
        RESUMEN TOTAL:<br>
        <b><span id="total-comp">0</span> Componentes</b> (<span id="det-base">0</span> BSMHuelva y <span id="det-ref">0</span> Refuerzos)<br>
        <b><span id="total-atriles">0</span> Atriles y <span id="total-sillas">0</span> Sillas</b>
    </div>
</div>

<div class="container no-print add-panel">
    <h4 style="margin:0 0 10px 0; color:#004481;">Añadir Instrumento Extra</h4>
    <div class="add-panel-controls">
        <input type="text" id="nuevo-nombre" placeholder="Nombre instrumento">
        <select id="nuevo-tipo">
            <option value="base">BSMHuelva</option>
            <option value="refuerzo">Refuerzo</option>
        </select>
        <button onclick="agregarFilaManual()" style="background:#007aff; color:white; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; flex-grow:1;">Añadir</button>
    </div>
    <div class="actions">
        <button class="main-btn btn-print" onclick="generarPDF()">IMPRIMIR</button>
        <button class="main-btn btn-back" onclick="window.history.go(-1); return false;">VOLVER</button>
        <button class="main-btn btn-clear" onclick="confirmarLimpiar()">LIMPIAR TODO</button>
    </div>
</div>

<script>
    const ORDEN_INSTRUMENTOS = ["Flautas", "Oboes", "Requinto", "Clarinetes", "Fagotes", "Saxo Soprano", "Saxos Altos", "Saxos Tenores", "Saxos Barítonos", "Trompas", "Trompetas", "Fliscornos", "Trombones", "Bombardinos", "Tubas", "Percusión"];
    
    const listaBase = ["Flauta", "Oboe", "Requinto", "Clarinete Pral.", "Clarinete 1º", "Clarinete 2º", "Clarinete 3º", "Clarinete Bajo", "Saxo Alto 1º", "Saxo Alto 2º", "Saxo Tenor 1º", "Saxo Tenor 2º", "Trompa", "Trompeta 1ª", "Trompeta 2ª", "Fliscorno", "Trombón 1º", "Trombón 2º", "Tuba 1ª", "Tuba 2ª", "Timbales", "Caja", "Bombo y Platos"];
   
    const listaRefuerzos = ["Flauta", "Oboe", "Requinto", "Clarinete", "Fagot", "Saxo Soprano", "Saxo Alto", "Saxo Tenor", "Saxo Barítono", "Trompa", "Trompeta", "Fliscorno", "Trombón", "Bombardino", "Tuba", "Percusión"];

    function inicializar() {
        listaBase.forEach(inst => {
            let v = 1; let act = true;
            if(inst.includes("Bajo")) { v = 0; act = false; }
            if(inst.includes("Bombo")) { v = 2; act = true; }
            crearFila(inst, 'base', act, v);
        });
        listaRefuerzos.forEach(inst => crearFila(inst, 'refuerzo', false, 0));
        calcularTotales();
    }

    function crearFila(nombre, tipo, activo, valor) {
        const tabla = document.getElementById(tipo === 'base' ? 'tabla-base' : 'tabla-refuerzo');
        const tr = document.createElement('tr');
        tr.className = tipo === 'base' ? 'row-base' : 'row-refuerzo';
        tr.setAttribute('data-tipo', tipo);
        
        const check = activo ? 'checked' : '';
        
        let n = nombre.toLowerCase();
        let valorSilla = valor;
        if (n.includes("timbales") || n.includes("caja") || n.includes("bombo") || n.includes("platos") || n.includes("percusion") || n.includes("percusión")) {
            valorSilla = 0;
        }
        
        tr.innerHTML = `
            <td class="no-print"><input type="checkbox" ${check} onchange="toggleFila(this)" style="width:20px; height:20px;"></td>
            <td class="inst-name">${nombre}</td>
            <td>${crearStepper('comp', true, valor)}</td>
            <td>${crearStepper('atril', false, valor)}</td>
            <td>${crearStepper('silla', false, valorSilla)}</td>
            <td class="no-print"><button style="color:red; border:none; background:none; font-size:24px; cursor:pointer; padding:0 10px;" onclick="this.closest('tr').remove(); calcularTotales();">✕</button></td>
        `;
        tabla.appendChild(tr);
    }

    function crearStepper(clase, esComp, valor) {
        return `<div class="stepper">
            <button class="btn-step no-print" onclick="step(this, -1, ${esComp})">-</button>
            <input type="number" class="qty-input ${clase}" value="${valor}" min="0" oninput="manualInput(this, ${esComp})">
            <button class="btn-step no-print" onclick="step(this, 1, ${esComp})">+</button>
        </div>`;
    }

    function step(btn, delta, esComp) {
        const input = btn.parentNode.querySelector('.qty-input');
        let n = (parseInt(input.value) || 0) + delta;
        if (n < 0) n = 0;
        input.value = n;
        actualizarFila(input.closest('tr'), n, esComp);
    }

    function manualInput(input, esComp) {
        let n = parseInt(input.value) || 0;
        if (n < 0) n = 0;
        actualizarFila(input.closest('tr'), n, esComp);
    }

    function actualizarFila(fila, n, esComp) {
        const cb = fila.querySelector('input[type="checkbox"]');
        if (n > 0) cb.checked = true;
        if (n === 0 && esComp) cb.checked = false;
        if (esComp) {
            fila.querySelector('.atril').value = n;
            let nombre = fila.querySelector('.inst-name').innerText.toLowerCase();
            if (!(nombre.includes("timbales") || nombre.includes("caja") || nombre.includes("bombo") || nombre.includes("platos") || nombre.includes("percusion") || nombre.includes("percusión"))) {
                fila.querySelector('.silla').value = n;
            }
        }
        calcularTotales();
    }

    function toggleFila(cb) {
        const fila = cb.closest('tr');
        const v = cb.checked ? 1 : 0;
        fila.querySelector('.comp').value = v;
        fila.querySelector('.atril').value = v;
        let nombre = fila.querySelector('.inst-name').innerText.toLowerCase();
        if (!(nombre.includes("timbales") || nombre.includes("caja") || nombre.includes("bombo") || nombre.includes("platos") || nombre.includes("percusion") || nombre.includes("percusión"))) {
            fila.querySelector('.silla').value = v;
        } else {
            fila.querySelector('.silla').value = 0;
        }
        calcularTotales();
    }

    function obtenerGrupo(nombre) {
        let n = nombre.toLowerCase();
        if (n.includes("flauta") || n.includes("flautín") || n.includes("flautin")) return "Flautas";
        if (n.includes("oboe")) return "Oboes";
        if (n.includes("requinto")) return "Requinto";
        if (n.includes("clarinete")) return "Clarinetes";
        if (n.includes("fagot")) return "Fagotes";
        if (n.includes("saxo soprano")) return "Saxo Soprano";
        if (n.includes("saxo alto")) return "Saxos Altos";
        if (n.includes("saxo tenor")) return "Saxos Tenores";
        if (n.includes("saxo barítono") || n.includes("saxo baritono")) return "Saxos Barítonos";
        if (n.includes("trompa")) return "Trompas";
        if (n.includes("trompeta")) return "Trompetas";
        if (n.includes("fliscorno")) return "Fliscornos";
        if (n.includes("trombón") || n.includes("trombon")) return "Trombones";
        if (n.includes("bombardino")) return "Bombardinos";
        if (n.includes("tuba")) return "Tubas";
        if (n.includes("percusion") || n.includes("percusión") || n.includes("timbales") || n.includes("caja") || n.includes("bombo") || n.includes("platos")) return "Percusión";
        return nombre;
    }

    function calcularTotales() {
        let cBase = 0, cRef = 0, atr = 0, sil = 0;
        let grupos = {};
        document.querySelectorAll('tr[data-tipo]').forEach(fila => {
            if (fila.querySelector('input[type="checkbox"]').checked) {
                let c = parseInt(fila.querySelector('.comp').value) || 0;
                let a = parseInt(fila.querySelector('.atril').value) || 0;
                let s = parseInt(fila.querySelector('.silla').value) || 0;
                if (fila.getAttribute('data-tipo') === 'base') cBase += c; else cRef += c;
                atr += a; sil += s;
                if (c > 0) {
                    let g = obtenerGrupo(fila.querySelector('.inst-name').innerText);
                    grupos[g] = (grupos[g] || 0) + c;
                }
            }
        });
        document.getElementById('subtotal-comp-base').innerText = cBase;
        document.getElementById('subtotal-comp-ref').innerText = cRef;
        document.getElementById('total-comp').innerText = cBase + cRef;
        document.getElementById('det-base').innerText = cBase;
        document.getElementById('det-ref').innerText = cRef;
        document.getElementById('total-atriles').innerText = atr;
        document.getElementById('total-sillas').innerText = sil;

        const listaDiv = document.getElementById('lista-agrupada');
        listaDiv.innerHTML = '';
        Object.keys(grupos).sort((a,b) => {
            let ia = ORDEN_INSTRUMENTOS.indexOf(a); let ib = ORDEN_INSTRUMENTOS.indexOf(b);
            return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        }).forEach(g => {
            listaDiv.innerHTML += `<div class="item-agrupado"><b>${grupos[g]}</b> ${g}</div>`;
        });
    }

    function agregarFilaManual() {
        const n = document.getElementById('nuevo-nombre').value;
        const t = document.getElementById('nuevo-tipo').value;
        if(n) { crearFila(n, t, true, 1); document.getElementById('nuevo-nombre').value = ''; calcularTotales(); }
    }

    function generarPDF() {
        const fechaInput = document.getElementById('fecha-actual').value;
        let fechaFormateada = "--";
        if (fechaInput) {
            const fechaObj = new Date(fechaInput + 'T00:00:00');
            fechaFormateada = fechaObj.toLocaleDateString('es-ES', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            fechaFormateada = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
        }

        const titulo = document.querySelector('input[placeholder=""]').value || 'Sin concierto';
        const ubicacion = document.querySelectorAll('input[placeholder=""]')[1].value || 'Sin lugar';
        const hora = document.getElementById('hora-actual').value || '--';
        const obs = document.querySelector('textarea').value.replace(/\n/g, '<br>') || 'Ninguna';

        const prioridad = ["Flauta", "Oboe", "Requinto", "Clarinete", "Fagot", "Saxo Soprano", "Saxo Alto", "Saxo Tenor", "Saxo Barítono", "Trompa", "Trompeta", "Fliscorno", "Trombón", "Bombardino", "Tuba", "Timbales", "Caja", "Bombo", "Percusión", "Piano", "Arpa"];

        let todosLosInstrumentos = [];
        document.querySelectorAll('tr[data-tipo]').forEach(fila => {
            const comp = parseInt(fila.querySelector('.comp').value) || 0;
            if (fila.querySelector('input[type="checkbox"]').checked && comp > 0) {
                todosLosInstrumentos.push({
                    nombre: fila.querySelector('.inst-name').innerText,
                    seccion: fila.getAttribute('data-tipo') === 'base' ? 'BSMH' : 'Refuerzo',
                    comp: comp,
                    atriles: fila.querySelector('.atril').value,
                    sillas: fila.querySelector('.silla').value
                });
            }
        });

        todosLosInstrumentos.sort((a, b) => {
            let indexA = prioridad.findIndex(p => a.nombre.includes(p));
            let indexB = prioridad.findIndex(p => b.nombre.includes(p));
            if (indexA === -1) indexA = 99;
            if (indexB === -1) indexB = 99;
            return indexA - indexB;
        });

        let filasHTML = '';
        todosLosInstrumentos.forEach(inst => {
            let claseSeccion = inst.seccion === 'BSMH' ? 'txt-bsmh' : 'txt-refuerzo';
            filasHTML += `
                <tr>
                    <td style="text-align:center; font-weight:bold;">${inst.comp}</td>
                    <td style="text-align:left;">${inst.nombre}</td>
                    <td style="text-align:center;" class="${claseSeccion}">${inst.seccion}</td>
                    <td style="text-align:center;">${inst.atriles}</td>
                    <td style="text-align:center;">${inst.sillas}</td>
                </tr>`;
        });

        const listaAgrupadaHTML = document.getElementById('lista-agrupada').innerHTML;
        const totalComp = document.getElementById('total-comp').innerText;
        const detBase = document.getElementById('det-base').innerText;
        const detRef = document.getElementById('det-ref').innerText;
        const totAtr = document.getElementById('total-atriles').innerText;
        const totSil = document.getElementById('total-sillas').innerText;

        const htmlFinal = `
            <html>
            <head>
                <title>BSMH - ${titulo}</title>
                <style>
                    @page { size: A4 portrait; margin: 15mm; }
                    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1c1c1e; line-height: 1.4; margin: 0; padding: 0; }
                    #pdf-content { padding: 10px; }
                    .header { text-align: center; border-bottom: 2px solid #004481; margin-bottom: 20px; padding-bottom: 10px; }
                    .header h2 { color: #004481; margin: 0; text-transform: uppercase; font-size: 18px; }
                    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 13px; }
                    .obs { background: #f9f9f9; padding: 10px; border-radius: 5px; font-size: 12px; margin-bottom: 20px; border: 1px solid #eee; border-left: 4px solid #004481; }
                    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                    th { background: #f2f2f7; color: #004481; border: 1px solid #004481; padding: 8px; font-size: 10px; text-transform: uppercase; }
                    td { border: 1px solid #ddd; padding: 6px 8px; font-size: 12px; }
                    .txt-bsmh { color: #004481; font-weight: bold; }
                    .txt-refuerzo { color: #28a745; font-weight: bold; }
                    
                    /* Salto de página vectorial real */
                    .page-break-before { break-before: page; page-break-before: always; margin-top: 30px; }
                    
                    .grid-agrupado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; font-size: 11px; border-top: 1px solid #004481; padding-top: 10px; margin-bottom: 20px; }
                    .item-agrupado { border-bottom: 1px solid #eee; padding: 2px 0; }
                    .resumen-final { border: 2px solid #004481; padding: 15px; text-align: center; border-radius: 8px; font-size: 14px; font-weight: bold; color: #004481; background-color: #f0f7ff; }
                </style>
            </head>
            <body>
                <div id="pdf-content">
                    <div class="header">
                        <h2>Banda Sinfónica Municipal de Huelva</h2>
                        <div style="font-weight:bold; margin-top:5px; letter-spacing: 1px;">INFORME TÉCNICO DE ESCENARIO</div>
                    </div>
                    <div class="info-grid">
                        <div><b>TÍTULO:</b> ${titulo}</div>
                        <div><b>FECHA:</b> ${fechaFormateada}</div>
                        <div><b>UBICACIÓN:</b> ${ubicacion}</div>
                        <div><b>HORA:</b> ${hora} horas</div>
                    </div>
                    <div class="obs"><b>OBSERVACIONES:</b><br>${obs}</div>
                    <table>
                        <thead>
                            <tr>
                                <th style="width:10%;">Comp.</th>
                                <th style="text-align:left; width:40%;">Instrumento</th>
                                <th style="width:20%;">Sección</th>
                                <th style="width:15%;">Atriles</th>
                                <th style="width:15%;">Sillas</th>
                            </tr>
                        </thead>
                        <tbody>${filasHTML}</tbody>
                    </table>
                    
                    <div class="page-break-before">
                        <h4 style="color:#004481; margin-bottom:5px; font-size:12px; text-transform: uppercase;">Listado Total de Instrumentos</h4>
                        <div class="grid-agrupado">${listaAgrupadaHTML}</div>
                        <div class="resumen-final">
                            RESUMEN TOTAL:<br>
                            ${totalComp} Componentes (${detBase} BSMHuelva y ${detRef} Refuerzos)<br>
                            ${totAtr} Atriles y ${totSil} Sillas
                        </div>
                    </div>
                </div>
            </body>
            </html>
        `;

        // MÉTODO VECTORIAL REAL:
        // Abrimos una ventana nueva con el contenido HTML puro.
        // Al usar window.print() en esa ventana, el sistema operativo genera un PDF 
        // basado en vectores de texto, no en una captura de pantalla.
        const ventana = window.open('', '_blank');
        ventana.document.write(htmlFinal);
        ventana.document.close();
        
        // Esperamos a que cargue y lanzamos el diálogo de impresión del sistema.
        // Para guardar como PDF, el usuario solo debe elegir "Guardar como PDF" en su impresora.
        ventana.onload = function() {
            setTimeout(() => { 
                ventana.print(); 
                ventana.close(); 
            }, 500);
        };
    }

    function confirmarLimpiar() { if(confirm("¿Vaciar todo?")) window.location.reload(); }

    window.onload = inicializar;
    
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
            e.preventDefault();
            generarPDF();
        }
    });
</script>
</body>
</html>
