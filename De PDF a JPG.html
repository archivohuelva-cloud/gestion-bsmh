<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Previa JPG - BSMH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #10b981;
            --danger: #ef4444;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-top {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .btn-back:hover {
            background-color: #f1f5f9;
            border-color: var(--text-muted);
        }

        .header-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 900px;
            width: 100%;
            border: 1px solid var(--border);
        }

        h1 {
            color: var(--text-main);
            font-size: 1.25rem;
            margin: 0 0 2rem 0;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.025em;
        }

        .upload-section {
            border: 2px dashed var(--border);
            padding: 48px 20px;
            text-align: center;
            border-radius: 12px;
            background: #fcfcfd;
            margin-bottom: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .upload-section.dragover {
            border-color: var(--accent);
            background: #f0f7ff;
            transform: scale(1.01);
        }

        .upload-section p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
            pointer-events: none;
        }

        .upload-section.hidden { display: none; }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border);
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }

        input.required-error {
            border-color: var(--danger);
            background-color: #fef2f2;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #download-btn { background-color: var(--primary); color: white; }
        #open-selector { background-color: white; color: var(--text-main); border-color: var(--border); }
        #clear-all { background-color: #fff1f2; color: var(--danger); border-color: #fecaca; }

        button:hover { filter: brightness(95%); transform: translateY(-1px); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .grid-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            overflow-y: auto;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 12px;
        }

        .page-thumb {
            cursor: pointer;
            border: 2px solid transparent;
            background: white;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .page-thumb:hover { border-color: var(--accent); transform: scale(1.02); }
        .page-thumb canvas { width: 100%; height: auto; border-radius: 4px; }
        .page-thumb span { display: block; margin-top: 8px; font-weight: 600; font-size: 0.8rem; color: var(--text-muted); }

        .final-preview {
            margin-top: 20px;
            padding: 30px;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            background: #f1f5f9;
            border: 1px solid var(--border);
        }

        canvas#main-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .error-msg { color: var(--danger); font-size: 0.75rem; margin-top: 4px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header-top">
        <button onclick="window.history.back()" class="btn-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Volver
        </button>
        <div class="header-info" id="current-date-time"></div>
    </div>

    <div class="card">
        <h1>Convertir de PDF a JPG la 1ª página del guión para previa en Biblio</h1>
        
        <div class="upload-section" id="upload-box">
            <p>Selecciona o arrastra el PDF del guion aquí</p>
            <input type="file" id="pdf-upload" accept="application/pdf" style="display:none;">
        </div>

        <div class="controls" id="adjustment-controls" style="display:none;">
            <div class="field">
                <label>Nº Registro</label>
                <input type="text" id="reg-number" placeholder="">
            </div>
            <div class="field">
                <label>Página</label>
                <input type="number" id="page-number" value="1" readonly style="background:#f1f5f9; text-align: center; border-color: transparent;">
            </div>
            <div class="field">
                <label>Ancho (px)</label>
                <input type="number" id="manual-width" value="800" min="100">
            </div>
            
            <button id="open-selector">Cambiar Página</button>
            <button id="download-btn">Descargar JPG</button>
            <button id="clear-all">Limpiar</button>
        </div>

        <div class="final-preview" id="preview-area">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <div id="page-modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; font-weight:700;">Seleccionar página</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.5rem;">&times;</button>
            </div>
            <div id="grid-preview" class="grid-preview"></div>
        </div>
    </div>

    <script>
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        const mainCanvas = document.getElementById('main-canvas');
        const modal = document.getElementById('page-modal');
        const grid = document.getElementById('grid-preview');
        const pageInput = document.getElementById('page-number');
        const widthInput = document.getElementById('manual-width');
        const regInput = document.getElementById('reg-number');
        const uploadBox = document.getElementById('upload-box');
        const controls = document.getElementById('adjustment-controls');
        const previewArea = document.getElementById('preview-area');
        const dateTimeDisplay = document.getElementById('current-date-time');

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            dateTimeDisplay.textContent = now.toLocaleDateString('es-ES', options);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Lógica de carga y drag & drop
        const fileInput = document.getElementById('pdf-upload');

        uploadBox.onclick = () => fileInput.click();

        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                processFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        async function processFile(file) {
            // Detectar automáticamente el número de registro (primer bloque de números, ignorando el -00)
            const match = file.name.match(/(\d+)/);
            if (match) {
                regInput.value = match[1];
                regInput.classList.remove('required-error');
            } else {
                regInput.value = '';
            }

            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfJS.getDocument(arrayBuffer).promise;
            uploadBox.classList.add('hidden');
            controls.style.display = 'grid';
            showPageSelector();
        }

        async function showPageSelector() {
            modal.style.display = 'flex';
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-muted);">Generando vistas previas...</p>';
            grid.innerHTML = '';

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 0.25 });
                
                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'page-thumb';
                thumbWrapper.onclick = () => {
                    pageInput.value = i;
                    closeModal();
                    renderFinal();
                };

                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.width = viewport.width;
                thumbCanvas.height = viewport.height;
                await page.render({ canvasContext: thumbCanvas.getContext('2d'), viewport }).promise;

                thumbWrapper.appendChild(thumbCanvas);
                const label = document.createElement('span');
                label.innerText = `Página ${i}`;
                thumbWrapper.appendChild(label);
                grid.appendChild(thumbWrapper);
            }
        }

        function closeModal() { modal.style.display = 'none'; }

        document.getElementById('open-selector').onclick = () => modal.style.display = 'flex';
        widthInput.onchange = () => renderFinal();
        regInput.oninput = () => regInput.classList.remove('required-error');

        document.getElementById('clear-all').onclick = () => {
            pdfDoc = null;
            fileInput.value = "";
            regInput.value = "";
            regInput.classList.remove('required-error');
            pageInput.value = "1";
            uploadBox.classList.remove('hidden');
            controls.style.display = 'none';
            previewArea.style.display = 'none';
            const ctx = mainCanvas.getContext('2d');
            ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        };

        async function renderFinal() {
            if (!pdfDoc) return;
            const pageNum = parseInt(pageInput.value);
            const targetWidth = parseInt(widthInput.value);
            
            const page = await pdfDoc.getPage(pageNum);
            const originalViewport = page.getViewport({ scale: 1.0 });
            const scaleFactor = targetWidth / originalViewport.width;
            const scaledViewport = page.getViewport({ scale: scaleFactor });

            mainCanvas.width = scaledViewport.width;
            mainCanvas.height = scaledViewport.height;

            await page.render({ 
                canvasContext: mainCanvas.getContext('2d'), 
                viewport: scaledViewport 
            }).promise;

            previewArea.style.display = 'flex';
        }

        document.getElementById('download-btn').onclick = () => {
            if (!pdfDoc) return;
            const regValue = regInput.value.trim();
            if (!regValue) {
                regInput.classList.add('required-error');
                regInput.focus();
                if (!regInput.parentNode.querySelector('.error-msg')) {
                    const errorBox = document.createElement('div');
                    errorBox.className = 'error-msg';
                    errorBox.innerText = 'Número de registro obligatorio';
                    regInput.parentNode.appendChild(errorBox);
                    setTimeout(() => errorBox.remove(), 3000);
                }
                return;
            }
            const link = document.createElement('a');
            link.download = `${regValue}.jpg`;
            link.href = mainCanvas.toDataURL("image/jpeg", 0.9);
            link.click();
        };
    </script>
</body>
</html>
