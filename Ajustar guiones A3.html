<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor PDF a A3 Profesional</title>
    <!-- Librerías necesarias -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --blue: #007bff; --dark-blue: #0056b3; --gray: #6c757d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 550px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        .header-btns { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-small { border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; color: white; font-size: 0.9rem; transition: 0.3s; }
        .btn-back { background: var(--gray); }
        .btn-clear { background: #dc3545; }
        .btn-small:hover { opacity: 0.8; }

        h1 { color: #333; font-size: 1.4rem; margin-top: 10px; }
        .drop-zone { border: 2px dashed var(--blue); background: #f8fbff; padding: 40px; border-radius: 10px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .drop-zone.dragover { background: #e1efff; border-color: var(--dark-blue); }
        
        .file-list { text-align: left; font-size: 0.85rem; color: #444; margin-bottom: 15px; background: #f9f9f9; padding: 15px; border-radius: 5px; max-height: 200px; overflow-y: auto; border: 1px solid #eee; }
        
        select { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 1rem; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: var(--dark-blue); }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }

        #status { margin-top: 15px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-btns">
        <button class="btn-small btn-back" onclick="window.history.back()">← Volver</button>
        <button class="btn-small btn-clear" id="clearBtn">Limpiar lista</button>
    </div>

    <h1>Ajustar el tamaño de los Guiones en A4 => A3</h1>
    <p style="font-size: 0.85rem; color: #666;">Arrastra los archivos PDFs o carpetas. <br>Se generará un <b>.ZIP</b> si hay varios archivos.</p>

    <div class="drop-zone" id="dropZone">
        Arrastra aquí tus PDFs o Carpetas
        <input type="file" id="fileInput" accept="application/pdf" multiple style="display:none">
    </div>

    <div class="file-list" id="fileList">No hay archivos seleccionados</div>

    <label style="display:block; text-align:left; margin-bottom:5px; font-weight: bold;">Tamaño de salida:</label>
    <select id="sizeSelect">
        <option value="A3" selected>A3 (297 x 420 mm) - Predeterminado</option>
        <option value="A4">A4 (210 x 297 mm)</option>
    </select>

    <button class="btn-main" id="processBtn">Procesar y Descargar</button>
    <div id="status"></div>
</div>

<script>
    const { PDFDocument, PageSizes } = PDFLib;
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileListDisplay = document.getElementById('fileList');
    const status = document.getElementById('status');
    const clearBtn = document.getElementById('clearBtn');
    const processBtn = document.getElementById('processBtn');

    let filesArray =[];

    // --- MANEJO DE ARCHIVOS Y CARPETAS ---
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => addFilesToList(Array.from(e.target.files));

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => { dropZone.classList.remove('dragover'); };

    dropZone.ondrop = async (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        
        const items = e.dataTransfer.items;
        const entries =[];
        
        // Extraer todas las entradas de forma síncrona primero
        for (let i = 0; i < items.length; i++) {
            const entry = items[i].webkitGetAsEntry();
            if (entry) entries.push(entry);
        }
        
        // Procesar las entradas extraídas de forma asíncrona
        for (let i = 0; i < entries.length; i++) {
            await traverseFileTree(entries[i]);
        }
        
        renderFileList();
    };

    async function traverseFileTree(entry) {
        if (entry.isFile && entry.name.toLowerCase().endsWith('.pdf')) {
            const file = await new Promise((resolve) => entry.file(resolve));
            filesArray.push(file);
        } else if (entry.isDirectory) {
            const dirReader = entry.createReader();
            const entries = await new Promise((resolve) => dirReader.readEntries(resolve));
            for (let i = 0; i < entries.length; i++) await traverseFileTree(entries[i]);
        }
    }

    function addFilesToList(files) {
        const pdfs = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
        filesArray =[...filesArray, ...pdfs];
        renderFileList();
    }

    function renderFileList() {
        fileListDisplay.innerHTML = filesArray.length === 0 ? "No hay archivos seleccionados" : 
            `<strong>${filesArray.length} archivos listos:</strong><br>` + filesArray.map(f => "📄 " + f.name).join("<br>");
    }

    clearBtn.onclick = () => {
        filesArray =[];
        fileInput.value = "";
        renderFileList();
        status.innerText = "";
    };

    // --- PROCESAMIENTO Y EMPAQUETADO ZIP ---
    processBtn.onclick = async () => {
        if (filesArray.length === 0) return alert("Añade archivos primero.");
        
        processBtn.disabled = true;
        status.innerText = "Procesando y comprimiendo...";
        status.style.color = "var(--blue)";

        const zip = new JSZip();
        const targetSizeKey = document.getElementById('sizeSelect').value;
        const[tWidth, tHeight] = PageSizes[targetSizeKey];

        try {
            for (const file of filesArray) {
                const bytes = await file.arrayBuffer();
                const pdfDoc = await PDFDocument.load(bytes, { ignoreEncryption: true });
                const pages = pdfDoc.getPages();

                pages.forEach(page => {
                    const { width, height } = page.getSize();
                    page.scale(tWidth / width, tHeight / height);
                    page.setSize(tWidth, tHeight);
                });

                const pdfBytes = await pdfDoc.save();
                
                if (filesArray.length === 1) {
                    // Descarga directa si es solo uno
                    downloadBlob(pdfBytes, file.name, "application/pdf");
                } else {
                    // Añadir al ZIP si son varios
                    zip.file(file.name, pdfBytes);
                }
            }

            if (filesArray.length > 1) {
                const zipContent = await zip.generateAsync({ type: "blob" });
                downloadBlob(zipContent, "Guiones redimensionados.zip", "application/zip");
            }

            status.innerText = "¡Completado!";
            status.style.color = "green";
        } catch (err) {
            console.error(err);
            status.innerText = "Error en el proceso.";
            status.style.color = "red";
        } finally {
            processBtn.disabled = false;
        }
    };

    function downloadBlob(data, fileName, mimeType) {
        const blob = new Blob([data], { type: mimeType });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }
</script>
</body>
</html>
