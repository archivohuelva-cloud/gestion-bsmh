<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unificador de Partituras - BSMH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'band-blue': '#1e3a8a', 'band-gold': '#b45309' } } } }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .drag-over { border-color: #1e3a8a !important; background-color: #eff6ff !important; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1e3a8a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-800">

    <header class="bg-band-blue text-white py-5 shadow-md">
        <div class="max-w-5xl mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="music" class="w-8 h-8 text-band-gold"></i>
                <div>
                    <h1 class="text-2xl font-bold">Unificador BSMH</h1>
                    <p class="text-blue-200 text-sm mt-0.5">Gestor y conversor de partituras</p>
                </div>
            </div>
        </div>
    </header>

    <!-- VISTA 1: SELECCIÓN -->
    <main id="home-view" class="flex-grow max-w-5xl mx-auto px-4 py-12 w-full flex flex-col items-center justify-center">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">¿Qué deseas hacer?</h2>
        <div class="grid md:grid-cols-2 gap-6 w-full max-w-4xl">
            <button onclick="setMode('A4')" class="bg-white border-2 border-gray-200 rounded-2xl p-8 text-left hover:border-blue-500 hover:shadow-xl transition-all group">
                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <i data-lucide="file-text" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-3">Unir PDF (A4)</h3>
                <p class="text-gray-600">Une múltiples partichelas en un solo PDF continuo.</p>
            </button>
            <button onclick="setMode('A3')" class="bg-white border-2 border-gray-200 rounded-2xl p-8 text-left hover:border-amber-500 hover:shadow-xl transition-all group">
                <div class="bg-amber-50 w-16 h-16 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <i data-lucide="book-open" class="w-8 h-8 text-amber-600"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-3">Pasar A4 a libros en A3</h3>
                <p class="text-gray-600">Convierte A4 en cuadernillos A3. 1-2 págs en una cara, +3 págs en formato libro.</p>
            </button>
        </div>
    </main>

    <!-- VISTA 2: APP -->
    <main id="app-view" class="hidden flex-grow max-w-4xl mx-auto px-4 py-8 w-full">
        <button onclick="goHome()" class="mb-6 flex items-center gap-2 text-gray-500 hover:text-band-blue transition-colors font-medium">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> Volver al inicio
        </button>

        <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
            <h2 id="mode-title" class="text-xl font-bold mb-4 border-b pb-2 text-gray-800"></h2>
            
            <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center transition-all cursor-pointer hover:border-blue-400 bg-gray-50">
                <input type="file" id="fileInput" multiple accept="application/pdf" class="hidden">
                <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden">
                <div class="flex flex-col items-center justify-center gap-3 pointer-events-none">
                    <i data-lucide="upload-cloud" class="w-12 h-12 text-blue-600"></i>
                    <p class="text-lg font-medium text-gray-700">Arrastra aquí tus PDFs o carpetas</p>
                </div>
                <div class="flex justify-center gap-3 mt-4">
                    <button onclick="event.stopPropagation(); document.getElementById('fileInput').click()" class="bg-band-blue text-white px-4 py-2 rounded-md text-sm">Archivos</button>
                    <button onclick="event.stopPropagation(); document.getElementById('folderInput').click()" class="bg-band-gold text-white px-4 py-2 rounded-md text-sm">Carpeta</button>
                </div>
            </div>

            <div id="listContainer" class="mt-6 hidden">
                <div class="flex items-center justify-between mb-3 px-3 bg-gray-100 py-2 rounded-lg">
                    <div class="flex gap-2 flex-wrap">
                        <span id="fileCounter" class="bg-blue-600 text-white text-[11px] px-2 py-0.5 rounded">0 PDFs</span>
                        <span id="copyCounter" class="bg-indigo-600 text-white text-[11px] px-2 py-0.5 rounded">0 Copias</span>
                        <span id="totalPageCounter" class="bg-emerald-600 text-white text-[11px] px-2 py-0.5 rounded">0 Págs. Totales</span>
                    </div>
                </div>
                
                <div id="pdfList" class="flex flex-col gap-1.5 max-h-[40vh] overflow-y-auto mb-4"></div>

                <div class="space-y-2">
                    <div class="flex items-center p-3 bg-indigo-50 border border-indigo-100 rounded-lg">
                        <input type="checkbox" id="bsmhCheckbox" class="w-4 h-4 text-indigo-600">
                        <label for="bsmhCheckbox" class="ml-2 text-sm font-bold text-indigo-800 cursor-pointer">Copias para BSMHuelva (Ajuste automático)</label>
                    </div>
                    <div id="doubleSidedContainer" class="flex items-center p-3 bg-blue-50 border border-blue-100 rounded-lg">
                        <input type="checkbox" id="doubleSidedCheckbox" class="w-4 h-4 text-blue-600">
                        <label for="doubleSidedCheckbox" class="ml-2 text-sm font-semibold text-gray-700 cursor-pointer">Preparar para impresión a doble cara (Añadir blanco en impares)</label>
                    </div>
                </div>

                <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-between items-center border-t pt-4">
                    <button id="clearBtn" class="text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg text-sm">Limpiar lista</button>
                    <button id="generateBtn" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold w-full sm:w-auto flex items-center gap-2 justify-center">
                        <i data-lucide="play" class="w-5 h-5"></i> <span id="generateBtnText">Generar</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="processingModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full text-center">
            <div class="loader mx-auto mb-4"></div>
            <h3 class="text-lg font-bold">Procesando...</h3>
            <p id="processingText" class="text-sm text-gray-500">Espera un momento</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentMode = 'A4';
        let uploadedFiles = [];

        const homeView = document.getElementById('home-view');
        const appView = document.getElementById('app-view');
        const pdfList = document.getElementById('pdfList');
        const bsmhCheckbox = document.getElementById('bsmhCheckbox');
        const doubleSidedCheckbox = document.getElementById('doubleSidedCheckbox');
        const processingModal = document.getElementById('processingModal');
        const processingText = document.getElementById('processingText');

        function setMode(mode) {
            currentMode = mode;
            homeView.classList.add('hidden');
            appView.classList.remove('hidden');
            document.getElementById('mode-title').innerText = mode === 'A4' ? 'Modo: Unir PDF (A4)' : 'Modo: Cuadernillos A3';
            document.getElementById('doubleSidedContainer').style.display = mode === 'A4' ? 'flex' : 'none';
            document.getElementById('generateBtnText').innerText = mode === 'A4' ? 'Generar PDF Final' : 'Generar ZIP para Imprenta';
            renderList();
        }

        function goHome() {
            appView.classList.add('hidden');
            homeView.classList.remove('hidden');
            uploadedFiles = [];
            bsmhCheckbox.checked = false;
        }

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
            document.getElementById('dropzone').addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
        });

        document.getElementById('dropzone').addEventListener('drop', async (e) => {
            const items = e.dataTransfer.items;
            let files = [];
            processingModal.classList.remove('hidden');
            processingText.textContent = "Escaneando archivos...";
            for (let i = 0; i < items.length; i++) {
                const entry = items[i].webkitGetAsEntry();
                if (entry) files = files.concat(await scanEntry(entry));
            }
            handleFiles(files);
        });

        async function scanEntry(entry) {
            let files = [];
            if (entry.isFile) {
                const file = await new Promise(res => entry.file(res));
                if (file.name.toLowerCase().endsWith('.pdf')) files.push(file);
            } else if (entry.isDirectory) {
                const reader = entry.createReader();
                const entries = await new Promise(res => reader.readEntries(res));
                for (const e of entries) files = files.concat(await scanEntry(e));
            }
            return files;
        }

        document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));
        document.getElementById('folderInput').addEventListener('change', e => handleFiles(e.target.files));

        async function handleFiles(files) {
            const newFiles = await Promise.all(Array.from(files).filter(f => f.name.toLowerCase().endsWith('.pdf')).map(async f => {
                const arrayBuffer = await f.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                return { id: Math.random().toString(36).substr(2,9), file: f, name: f.name, copies: 1, pageCount: pdf.getPageCount() };
            }));
            uploadedFiles = [...uploadedFiles, ...newFiles].sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
            if (bsmhCheckbox.checked) applyBSMHRules();
            renderList();
            processingModal.classList.add('hidden');
        }

        function applyBSMHRules() {
            const normalize = t => t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            uploadedFiles.forEach(item => {
                const n = normalize(item.name);
                let c = 1;
                if (/clarinete\s*pral\s*y\s*1/.test(n)) c = 3;
                else if (/clarinete\s*1/.test(n)) c = 2;
                else if (/saxo\s*alto/.test(n) || /saxo\s*tenor/.test(n) || /trompeta/.test(n) || /trombon/.test(n) || /tuba/.test(n) || /bombo/.test(n)) c = 2;
                item.copies = c;
            });
        }

        bsmhCheckbox.addEventListener('change', () => {
            if (bsmhCheckbox.checked) applyBSMHRules();
            else uploadedFiles.forEach(f => f.copies = 1);
            renderList();
        });

        function renderList() {
            const container = document.getElementById('listContainer');
            if (uploadedFiles.length === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');

            let totalPagesFinal = 0;
            let totalCopies = 0;

            pdfList.innerHTML = '';
            uploadedFiles.forEach((item, idx) => {
                totalCopies += item.copies;
                let pagesPerCopy = item.pageCount;
                if (currentMode === 'A4') {
                    if (doubleSidedCheckbox.checked && pagesPerCopy % 2 !== 0) pagesPerCopy++;
                } else {
                    // Lógica visual de conteo para A3
                    let a3Pages = Math.ceil(item.pageCount / 4) * 2;
                    if (item.pageCount <= 2) a3Pages = 2; // 1 hoja A3 frente y 1 dorso blanco
                    else if (a3Pages % 2 !== 0) a3Pages++; 
                    pagesPerCopy = a3Pages;
                }
                totalPagesFinal += (pagesPerCopy * item.copies);

                const div = document.createElement('div');
                div.className = 'flex items-center bg-white border p-2 rounded-lg h-12 text-sm';
                div.dataset.id = item.id;
                div.innerHTML = `
                    <span class="w-6 font-bold text-gray-400">${idx+1}</span>
                    <p class="flex-grow truncate px-2">${item.name} <span class="text-[10px] text-gray-400">(${item.pageCount}p)</span></p>
                    <div class="flex items-center gap-2">
                        <div class="flex items-center border rounded bg-gray-50">
                            <button onclick="updateCopies('${item.id}', -1)" class="px-2">-</button>
                            <span class="w-6 text-center font-bold">${item.copies}</span>
                            <button onclick="updateCopies('${item.id}', 1)" class="px-2">+</button>
                        </div>
                        <button onclick="removeFile('${item.id}')" class="text-red-400 px-1"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                `;
                pdfList.appendChild(div);
            });

            document.getElementById('fileCounter').innerText = `${uploadedFiles.length} PDFs`;
            document.getElementById('copyCounter').innerText = `${totalCopies} Copias`;
            document.getElementById('totalPageCounter').innerText = `${totalPagesFinal} Págs. Totales`;
            lucide.createIcons();
        }

        window.updateCopies = (id, v) => {
            const f = uploadedFiles.find(x => x.id === id);
            if (f) f.copies = Math.max(1, f.copies + v);
            renderList();
        };

        window.removeFile = id => {
            uploadedFiles = uploadedFiles.filter(x => x.id !== id);
            renderList();
        };

        new Sortable(pdfList, {
            animation: 150,
            onEnd: () => {
                const ids = Array.from(pdfList.children).map(el => el.dataset.id);
                uploadedFiles = ids.map(id => uploadedFiles.find(f => f.id === id));
                renderList();
            }
        });

        document.getElementById('generateBtn').onclick = async () => {
            if (uploadedFiles.length === 0) return;
            processingModal.classList.remove('hidden');
            try {
                if (currentMode === 'A4') await generateA4();
                else await generateA3();
            } catch (e) { 
                console.error(e);
                alert("Error durante la generación: " + e.message); 
            }
            processingModal.classList.add('hidden');
        };

        async function generateA4() {
            const merged = await PDFLib.PDFDocument.create();
            for (const item of uploadedFiles) {
                const doc = await PDFLib.PDFDocument.load(await item.file.arrayBuffer());
                for (let i = 0; i < item.copies; i++) {
                    const pages = await merged.copyPages(doc, doc.getPageIndices());
                    pages.forEach(p => merged.addPage(p));
                    if (doubleSidedCheckbox.checked && doc.getPageCount() % 2 !== 0) {
                        merged.addPage([pages[0].getWidth(), pages[0].getHeight()]);
                    }
                }
            }
            download(await merged.save(), "Unificado_A4.pdf");
        }

        async function generateA3() {
            const zip = new JSZip();
            const mergedA3 = await PDFLib.PDFDocument.create();
            const { degrees } = PDFLib;

            for (const item of uploadedFiles) {
                processingText.innerText = "Procesando: " + item.name;
                const original = await PDFLib.PDFDocument.load(await item.file.arrayBuffer());
                const pCount = original.getPageCount();
                const out = await PDFLib.PDFDocument.create();
                
                const ref = original.getPage(0);
                const w = ref.getWidth();
                const h = ref.getHeight();

                if (pCount === 1) {
                    // CASO 1 PÁGINA: Derecha + Dorso Blanco
                    const pA = out.addPage([h, w * 2]);
                    const [img] = await out.embedPdf(original, [0]);
                    pA.drawPage(img, { x: 0, y: w, rotate: degrees(-90) });
                    out.addPage([h, w * 2]); 
                } 
                else if (pCount === 2) {
                    // CASO 2 PÁGINAS: Juntas en la misma cara (1 Izq, 2 Der) + Dorso Blanco
                    const pA = out.addPage([h, w * 2]);
                    const [img1] = await out.embedPdf(original, [0]);
                    const [img2] = await out.embedPdf(original, [1]);
                    pA.drawPage(img1, { x: 0, y: w * 2, rotate: degrees(-90) }); // Izquierda
                    pA.drawPage(img2, { x: 0, y: w, rotate: degrees(-90) });     // Derecha
                    out.addPage([h, w * 2]); // Dorso blanco para separar instrumentos
                }
                else {
                    // CASO 3+ PÁGINAS: Formato Cuadernillo (Libro)
                    const totalP = Math.ceil(pCount / 4) * 4;
                    const sheets = totalP / 4;

                    for (let i = 0; i < sheets; i++) {
                        // Cara A (Exterior)
                        const pA = out.addPage([h, w * 2]);
                        const idxL = (totalP - 1 - 2 * i);
                        const idxR = (2 * i);
                        
                        if (idxL < pCount) {
                            const [img] = await out.embedPdf(original, [idxL]);
                            pA.drawPage(img, { x: 0, y: w * 2, rotate: degrees(-90) });
                        }
                        if (idxR < pCount) {
                            const [img] = await out.embedPdf(original, [idxR]);
                            pA.drawPage(img, { x: 0, y: w, rotate: degrees(-90) });
                        }

                        // Cara B (Interior)
                        const pB = out.addPage([h, w * 2]);
                        const idxBL = (2 * i + 1);
                        const idxBR = (totalP - 2 - 2 * i);
                        
                        if (idxBR < pCount) {
                            const [img] = await out.embedPdf(original, [idxBR]);
                            pB.drawPage(img, { x: h, y: w, rotate: degrees(90) });
                        }
                        if (idxBL < pCount) {
                            const [img] = await out.embedPdf(original, [idxBL]);
                            pB.drawPage(img, { x: h, y: 0, rotate: degrees(90) });
                        }
                    }
                    
                    // Asegurar que el instrumento termine en hoja par para no solapar al siguiente
                    if (out.getPageCount() % 2 !== 0) {
                        out.addPage([h, w * 2]);
                    }
                }

                const bytes = await out.save();
                zip.file(item.name, bytes);

                for (let c = 0; c < item.copies; c++) {
                    const pages = await mergedA3.copyPages(out, out.getPageIndices());
                    pages.forEach(p => mergedA3.addPage(p));
                }
            }

            zip.file("00_UNIFICADO_A3.pdf", await mergedA3.save());
            const content = await zip.generateAsync({type:"blob"});
            download(content, "Partituras_A3_BSMH.zip");
        }

        function download(data, name) {
            const blob = new Blob([data], { type: name.endsWith('.pdf') ? 'application/pdf' : 'application/zip' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('clearBtn').onclick = () => { if(confirm("¿Limpiar lista?")) { uploadedFiles=[]; renderList(); } };
    </script>
</body>
</html>
